services:
  # Seq - Centralized Logging (Development)
  seq:
    image: datalust/seq:2024.3
    container_name: handysales_seq_dev
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: "admin123"
    ports:
      - "1341:5341"   # Ingestion API
      - "1082:80"     # Web UI
    volumes:
      - seq_dev_data:/data
    networks:
      - handysales_dev_network

  # PostgreSQL Database (single instance with multiple databases)
  # Using PostGIS image for spatial queries (ST_Distance, etc.) — same PostgreSQL 16, adds extensions
  postgres:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.Postgres.Dev
    container_name: handysales_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: handy_user
      POSTGRES_PASSWORD: handy_pass
      POSTGRES_DB: handy_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      # EF Core creates all 48 tables via migration on api_main startup.
      # After first startup, seed data manually:
      #   docker exec -i handysales_postgres_dev psql -U handy_user -d handy_erp < infra/database/schema/seed_local_pg.sql
      #   docker exec -i handysales_postgres_dev psql -U handy_user -d handy_erp < infra/database/schema/seed_e2e_pg.sql
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=16MB
      -c max_connections=200
      -c effective_cache_size=512MB
      -c wal_buffers=16MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U handy_user -d handy_erp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - handysales_dev_network

  # API Principal (HandySales.Api)
  api_main:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.Main.Dev
    container_name: handysales_api_main_dev
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:1050
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=handy_erp;Username=handy_user;Password=handy_pass;Pooling=true;Minimum Pool Size=5;Maximum Pool Size=50;Connection Lifetime=300;"
      Jwt__Secret: "DevelopmentSecretKeyThatIsAtLeast256BitsLong_1234567890123456789012345678901234567890"
      Jwt__Issuer: "HandySales"
      Jwt__Audience: "HandySalesUsers"
      Jwt__ExpirationMinutes: 60
      Multitenancy__DefaultTenantId: "00000000-0000-0000-0000-000000000001"
      Multitenancy__DefaultTenantName: "Default"
      Cloudinary__Url: "${CLOUDINARY_URL:-cloudinary://placeholder:placeholder@placeholder}"
      Seq__ServerUrl: "http://seq:5341"
      SENDGRID_API_KEY: "${SENDGRID_API_KEY}"
      SENDGRID_FROM_EMAIL: "${SENDGRID_FROM_EMAIL}"
      SENDGRID_FROM_NAME: "${SENDGRID_FROM_NAME}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
    ports:
      - "1050:1050"
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started
    volumes:
      - ./apps/api/logs/main:/app/logs
      - ./apps/api/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1050/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - handysales_dev_network

  # API de Facturación (HandySales.Billing.Api)
  api_billing:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.Billing.Dev
    container_name: handysales_api_billing_dev
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:1051
      ConnectionStrings__BillingConnection: "Host=postgres;Port=5432;Database=handy_billing;Username=handy_user;Password=handy_pass;"
      ConnectionStrings__MainConnection: "Host=postgres;Port=5432;Database=handy_erp;Username=handy_user;Password=handy_pass;"
      Jwt__Secret: "DevelopmentSecretKeyThatIsAtLeast256BitsLong_1234567890123456789012345678901234567890"
      Jwt__Issuer: "HandySales"
      Jwt__Audience: "HandySalesUsers"
      Jwt__ExpirationMinutes: 60
      SAT__CertificadoPath: "/app/certificates"
      SAT__WebServiceUrl: "https://consultaqr.facturaelectronica.sat.gob.mx/ConsultaCFDIService.svc"
      Seq__ServerUrl: "http://seq:5341"
      SENDGRID_API_KEY: ""
      SENDGRID_FROM_EMAIL: "noreply@handysuites.com"
      SENDGRID_FROM_NAME: "Handy Suites"
    ports:
      - "1051:1051"
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started
    volumes:
      - ./apps/api/logs/billing:/app/logs
      - ./apps/api/certificates:/app/certificates
      - ./apps/api/facturas:/app/facturas
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1051/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - handysales_dev_network

  # API Móvil (HandySales.Mobile.Api)
  api_mobile:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.Mobile.Dev
    container_name: handysales_api_mobile_dev
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:1052
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=handy_erp;Username=handy_user;Password=handy_pass;Pooling=true;Minimum Pool Size=5;Maximum Pool Size=50;Connection Lifetime=300;"
      Jwt__Secret: "DevelopmentSecretKeyThatIsAtLeast256BitsLong_1234567890123456789012345678901234567890"
      Jwt__Issuer: "HandySales"
      Jwt__Audience: "HandySalesUsers"
      Jwt__ExpirationMinutes: 60
      Multitenancy__DefaultTenantId: "00000000-0000-0000-0000-000000000001"
      Multitenancy__DefaultTenantName: "Default"
      Seq__ServerUrl: "http://seq:5341"
      RUN_MIGRATIONS: "false"
    ports:
      - "1052:1052"
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started
    volumes:
      - ./apps/mobile/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1052/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - handysales_dev_network

  # Frontend Web (Next.js) — Usar solo si NO corres el frontend localmente
  # Para desarrollo: correr 'npm run dev' localmente es ~15x más rápido
  # Solo usar este container si necesitas simular producción
  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.Web.Dev
    container_name: handysales_web_dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 1083
      # Client-side (browser) uses localhost
      NEXT_PUBLIC_API_URL: http://localhost:1050
      # Server-side (NextAuth) uses Docker internal network
      API_URL: http://api_main:1050
      NEXTAUTH_URL: http://localhost:1083
      NEXTAUTH_SECRET: dev-secret-key-change-in-production
    ports:
      - "1083:1083"
    depends_on:
      - api_main
    volumes:
      # Mount source for hot reload
      - ./apps/web/src:/app/src
      - ./apps/web/public:/app/public
    networks:
      - handysales_dev_network
    profiles:
      - web  # Solo se ejecuta si usas: docker-compose --profile web up -d

  # Nginx Reverse Proxy (opcional para desarrollo)
  nginx:
    image: nginx:alpine
    container_name: handysales_nginx_dev
    restart: unless-stopped
    ports:
      - "1080:80"
    volumes:
      - ./infra/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api_main
      - api_billing
      - api_mobile
    networks:
      - handysales_dev_network
    profiles:
      - nginx  # Solo se ejecuta si usas: docker-compose --profile nginx up

  # pgAdmin (database administration tool, optional)
  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: handysales_pgadmin_dev
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@handysales.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "1081:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - handysales_dev_network
    profiles:
      - admin  # Solo se ejecuta si usas: docker-compose --profile admin up

volumes:
  postgres_dev_data:
    driver: local
  seq_dev_data:
    driver: local

networks:
  handysales_dev_network:
    driver: bridge
    name: handysales_dev_network