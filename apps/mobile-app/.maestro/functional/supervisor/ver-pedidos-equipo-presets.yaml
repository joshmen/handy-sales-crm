appId: com.handysuites.app
name: "Supervisor: ver pedidos del equipo con presets Hoy/Ayer/7 dias/30 dias"
---
# ============================================================
# CASO: sup-pedidos-equipo
# Rol: SUPERVISOR
# Capa: mobile
#
# Componente bajo prueba:
#   apps/mobile-app/src/components/admin/AdminTenantPedidosList.tsx
# Pantalla:
#   Tab "Vender" cuando el rol es SUPERVISOR/ADMIN/SUPER_ADMIN
#   (apps/mobile-app/app/(tabs)/vender/index.tsx -> VenderAdminContent)
# Endpoint backend:
#   GET /api/mobile/supervisor/pedidos?rango=7d|30d  o  ?dia=YYYY-MM-DD
#   (MobileSupervisorEndpoints.cs)
#
# Cobertura funcional:
#   1. Login supervisor -> dashboard.
#   2. Navegar a tab Vender -> ve la lista admin/supervisor.
#   3. Asserts presets visibles: "Hoy" | "Ayer" | "7 dias" | "30 dias".
#   4. Tap en cada preset -> el header de la lista cambia el titulo:
#        Hoy   -> "Pedidos hoy"
#        Ayer  -> "Pedidos ayer"
#        7d    -> "Pedidos ultimos 7 dias"
#        30d   -> "Pedidos ultimos 30 dias"
#   5. Cross-check no-leak: no aparecen vendedores de otros tenants.
#
# Riesgo cubierto:
#   - Preset chip rompe el query (rango vs dia) -> resultado vacio en 7d/30d.
#   - Header label desincronizado del preset activo.
#   - Over-share de pedidos de otro tenant (Huichol / Centro).
# ============================================================

# ---- FASE 1: Login SUPERVISOR (helper robusto: onboarding/consent/logout) ----
- runFlow:
    file: ../../_helpers/login-as.yaml
    env:
      EMAIL: "supervisor@jeyma.com"
      PASSWORD: "test123"

# ---- FASE 3: Dashboard supervisor cargado ----
# "Mi Equipo" es el titulo del TAB Equipo, no del dashboard Hoy. El
# dashboard supervisor expone el KPI "Vendedores activos".
- extendedWaitUntil:
    visible: "Vendedores activos"
    timeout: 30000

- takeScreenshot: sup-pedidos-presets-01-dashboard

# ---- FASE 4: Ir a tab "Vender" ----
# Doble tap garantiza reset al stack inicial del tab si ya estaba activo.
- tapOn: "Vender"
- tapOn: "Vender"
- waitForAnimationToEnd:
    timeout: 5000

# La cabecera del componente AdminTenantPedidosList arranca en preset "hoy"
# y muestra "Pedidos hoy" como title. Esto a su vez confirma que el rol
# fue detectado como SUPERVISOR (vendedor veria el flujo offline normal).
- extendedWaitUntil:
    visible: "Pedidos hoy"
    timeout: 20000

- assertVisible: "Hoy"
- assertVisible: "Ayer"
- assertVisible: "7 días"
- assertVisible: "30 días"

- takeScreenshot: sup-pedidos-presets-02-default-hoy

# ---- FASE 5: Preset "Ayer" ----
- tapOn:
    id: "filtro-rango-ayer"
- waitForAnimationToEnd:
    timeout: 4000

- extendedWaitUntil:
    visible: "Pedidos ayer"
    timeout: 15000

- assertVisible: "Pedidos ayer"
- takeScreenshot: sup-pedidos-presets-03-ayer

# ---- FASE 6: Preset "7 días" ----
- tapOn:
    id: "filtro-rango-7d"
- waitForAnimationToEnd:
    timeout: 4000

- extendedWaitUntil:
    visible: "Pedidos últimos 7 días"
    timeout: 15000

- assertVisible: "Pedidos últimos 7 días"
- takeScreenshot: sup-pedidos-presets-04-7d

# ---- FASE 7: Preset "30 días" ----
- tapOn:
    id: "filtro-rango-30d"
- waitForAnimationToEnd:
    timeout: 4000

- extendedWaitUntil:
    visible: "Pedidos últimos 30 días"
    timeout: 15000

- assertVisible: "Pedidos últimos 30 días"
- takeScreenshot: sup-pedidos-presets-05-30d

# ---- FASE 8: Vuelta a "Hoy" (estado idempotente para siguiente suite) ----
- tapOn:
    id: "filtro-rango-hoy"
- waitForAnimationToEnd:
    timeout: 4000

- extendedWaitUntil:
    visible: "Pedidos hoy"
    timeout: 15000

- assertVisible: "Pedidos hoy"

# ---- FASE 9: Cross-tenant no-leak ----
# Seed: "Admin Huichol" y "Admin Centro" pertenecen a OTROS tenants.
# Si aparecen como autor de un pedido en esta lista, hay over-share del
# endpoint /api/mobile/supervisor/pedidos. Esto valida el scoping
# por tenant_id + RBAC supervisor->subordinados.
- assertNotVisible: "Admin Huichol"
- assertNotVisible: "Admin Centro"

- takeScreenshot: sup-pedidos-presets-06-no-leak

# ---- FASE 10: Cierre suave ----
# No hacemos logout para mantener la sesion estable y permitir encadenar
# este flow con suite-supervisor-mobile-flow.yaml sin re-login.
- tapOn:
    id: "tab-equipo"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: sup-pedidos-presets-07-cierre-equipo
