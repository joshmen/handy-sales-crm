appId: com.handysuites.app
name: "Vendedor - Cobro en plan de pagos / cuotas (workaround multi-cobro parcial)"
tags:
  - vendedor
  - cobranza
  - cuotas
  - plan-pagos
  - extras
  - e2e
---

# ════════════════════════════════════════════════════════════════════
# USE CASE: ext-cobro-plan-cuotas (VENDEDOR)
#
# El vendedor recibe el pago de una factura en CUOTAS (plan de pagos)
# y debe registrar cada cuota como un cobro parcial independiente.
#
# IMPORTANTE — PROD GAP / FIX TODO:
#   El mobile NO tiene un screen nativo "Plan de Pagos / Cuotas".
#   El modulo de cobranza solo soporta UN monto por cobro y el metodo
#   esta fijo a "Pago en efectivo" (selector removido en audit 2026-05-07).
#   Para simular un plan de 3 cuotas hay que registrar 3 cobros
#   parciales consecutivos contra el mismo cliente y validar que el
#   "Saldo Pendiente" del Estado de Cuenta decrementa cuota por cuota.
#
#   Cuando el feature nativo exista (entity PlanPago + screen
#   /cobrar/plan/[clienteId]) este flow debe migrarse a:
#     - tap "Crear plan de pagos"
#     - capturar # de cuotas + monto por cuota + fecha primer pago
#     - confirmar y validar la lista de cuotas calendarizadas
#
# Cubre:
#   1. Registrar Cuota #1 (parcial 1) sobre cliente con saldo
#   2. Volver al hub + abrir Estado de Cuenta del mismo cliente
#   3. Verificar que el movimiento de la cuota aparece y que el saldo
#      pendiente se redujo respecto al inicial.
#   4. Registrar Cuota #2 (parcial 2) — pago abona al saldo restante
#   5. Validar que el card "Pendiente" del dashboard sigue > 0 tras 2
#      cuotas (plan incompleto, NO se cancela la deuda)
#
# PREREQ:
#   - Emulador Android con Expo Go en Metro :8081
#   - Backend docker-compose up con seed Jeyma (cliente
#     "Abarrotes Don Pancho" con factura pendiente > 200 MXN)
#   - Sesion vendedor: el flow ejecuta login subflow
# ════════════════════════════════════════════════════════════════════

- launchApp:
    clearState: false

# 1. Login VENDEDOR (subflow)
- runFlow: ../../auth/01-login-vendedor.yaml

# 2. Dismiss de modales opcionales post-login
- runFlow:
    when:
      visible: "Permitir"
    commands:
      - tapOn: "Permitir"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "Mientras uso la app"
    commands:
      - tapOn: "Mientras uso la app"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "AHORA NO"
    commands:
      - tapOn: "AHORA NO"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "Aviso de Privacidad"
    commands:
      - tapOn: "Aceptar"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "Mas tarde"
    commands:
      - tapOn: "Mas tarde"
      - waitForAnimationToEnd

# 3. Esperar dashboard "Hoy" hidratado
- extendedWaitUntil:
    visible: "Hoy"
    timeout: 30000

# ════════════════════════════════════════════════════════════════════
# CUOTA #1 — primer pago del plan (100 MXN)
# ════════════════════════════════════════════════════════════════════

- tapOn: "Cobrar"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Cobranza"
    timeout: 15000

- takeScreenshot: cuotas-01-dashboard-inicial

# Sanity de cartera
- assertVisible:
    text: "Facturado"
    optional: true
- assertVisible:
    text: "Cobrado"
    optional: true
- assertVisible:
    text: "Pendiente"
    optional: true

# Iniciar registro de cobro
- tapOn:
    id: "btn-registrar-cobro"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Registrar Cobro"
    timeout: 10000

- assertVisible:
    text: "Monto a Cobrar"
    optional: true

# PROD GAP / FIX TODO:
# No existe selector de "# de cuotas" ni de "fecha proxima cuota".
# Validamos que el badge "Pago en efectivo" sigue siendo el unico
# metodo disponible — confirma que el plan se registra como cobros
# en efectivo sueltos, no como un objeto plan-de-pagos.
- assertVisible:
    text: "Pago en efectivo"
    optional: true

# Seleccionar cliente del plan
- tapOn: "Seleccionar cliente"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Buscar cliente por nombre"
    timeout: 5000

- tapOn: "Buscar cliente por nombre"
- inputText: "Abarrotes"
- waitForAnimationToEnd
- hideKeyboard

- tapOn: "Abarrotes Don Pancho"
- waitForAnimationToEnd

- takeScreenshot: cuotas-02-cliente-plan-seleccionado

# Monto Cuota #1 = 100 MXN (parcial)
- tapOn:
    text: "0.00"
- inputText: "100"
- hideKeyboard

# Validar NO overSaldo (cuota parcial, saldo del seed > 100)
- assertNotVisible: "Monto excede el saldo pendiente"

# Notas con identificador de cuota — es la unica via para trazar el
# plan en el recibo dado que no hay campo nativo "Cuota X de Y".
- tapOn: "Observaciones adicionales"
- inputText: "Plan pagos - Cuota 1 de 3"
- hideKeyboard

- takeScreenshot: cuotas-03-cuota1-listo

# Confirmar Cuota #1
- tapOn:
    text: "Confirmar Cobro.*"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Registrar cobro de"
    timeout: 5000

- tapOn:
    text: "Confirmar"
    index: 1

# Recibo de Cuota #1
- extendedWaitUntil:
    visible: "Cobro Registrado"
    timeout: 15000

- takeScreenshot: cuotas-04-recibo-cuota1

- assertVisible: "Cobro Registrado"
- assertVisible:
    text: "Abarrotes Don Pancho"
    optional: true

# Salir del recibo
- runFlow:
    when:
      visible: "Listo"
    commands:
      - tapOn:
          text: "Listo"
      - waitForAnimationToEnd

# Reset stack del tab
- tapOn: "Cobrar"
- tapOn: "Cobrar"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Cobranza"
    timeout: 15000

# ════════════════════════════════════════════════════════════════════
# VERIFICACION INTERMEDIA — abrir Estado de Cuenta del cliente del plan
# y validar que la Cuota #1 redujo el saldo pendiente.
# ════════════════════════════════════════════════════════════════════

- scroll

- assertVisible:
    text: "SALDOS POR CLIENTE"
    optional: true

- scroll

# Tap accessibilityLabel "Estado de cuenta de Abarrotes Don Pancho..."
- tapOn:
    id: "Estado de cuenta de Abarrotes Don Pancho.*"
    optional: true

# Fallback si el id no matcheo: tap directo al texto del cliente
- runFlow:
    when:
      visible: "Abarrotes Don Pancho"
    commands:
      - tapOn:
          text: "Abarrotes Don Pancho"
          optional: true

- extendedWaitUntil:
    visible: "Estado de Cuenta"
    timeout: 10000

- takeScreenshot: cuotas-05-estado-cuenta-tras-cuota1

- assertVisible:
    text: "Saldo Pendiente"
    optional: true

# El movimiento de la cuota #1 debe aparecer en la lista (concepto
# "Cobro" + monto 100). El icono ArrowDown verde indica abono.
- assertVisible:
    text: "Cobro"
    optional: true

# ════════════════════════════════════════════════════════════════════
# CUOTA #2 — segundo pago del plan (75 MXN) desde la misma pantalla
# ════════════════════════════════════════════════════════════════════

# El boton "Registrar Cobro" en Estado de Cuenta navega a /cobrar/registrar
# con clienteId + saldo pre-cargados, ahorrando el picker.
- tapOn:
    text: "Registrar Cobro"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Monto a Cobrar"
    timeout: 10000

# Verificar que cliente y saldo vienen pre-cargados (no picker)
- assertVisible:
    text: "Saldo pendiente:"
    optional: true

- assertVisible:
    text: "Pago en efectivo"
    optional: true

# Monto Cuota #2 = 75 MXN
- tapOn:
    text: "0.00"
- inputText: "75"
- hideKeyboard

- assertNotVisible: "Monto excede el saldo pendiente"

- tapOn: "Observaciones adicionales"
- inputText: "Plan pagos - Cuota 2 de 3"
- hideKeyboard

- takeScreenshot: cuotas-06-cuota2-listo

- tapOn:
    text: "Confirmar Cobro.*"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Registrar cobro de"
    timeout: 5000

- tapOn:
    text: "Confirmar"
    index: 1

- extendedWaitUntil:
    visible: "Cobro Registrado"
    timeout: 15000

- takeScreenshot: cuotas-07-recibo-cuota2

- assertVisible: "Cobro Registrado"

# Asegurar que NO hubo error de sync ni rechazo backend
- assertNotVisible: "No se pudo registrar el cobro"
- assertNotVisible: "Failed"
- assertNotVisible: "Sin conexion"

- runFlow:
    when:
      visible: "Listo"
    commands:
      - tapOn:
          text: "Listo"
      - waitForAnimationToEnd

# ════════════════════════════════════════════════════════════════════
# VERIFICACION FINAL — el plan sigue ABIERTO tras 2 cuotas
# ════════════════════════════════════════════════════════════════════

- tapOn: "Cobrar"
- tapOn: "Cobrar"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Cobranza"
    timeout: 15000

- takeScreenshot: cuotas-08-dashboard-final

# El dashboard sigue mostrando cartera (no se cancelo la deuda)
- assertVisible: "Facturado"
- assertVisible: "Cobrado"

# Card "Pendiente" sigue presente — el plan de 3 cuotas no termino,
# debe quedar saldo restante por la Cuota #3 no registrada.
- assertVisible:
    text: "Pendiente"
    optional: true

# Sesion vendedor sigue activa (tab bar intacto)
- assertVisible: "Vender"
- assertVisible: "Cobrar"
- assertVisible: "Ruta"
- assertVisible: "Más"

- takeScreenshot: cuotas-09-plan-incompleto-saldo-restante
