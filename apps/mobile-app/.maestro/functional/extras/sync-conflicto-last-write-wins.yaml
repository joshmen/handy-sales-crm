appId: host.exp.exponent
name: "Funcional > Extras > Sync conflicto WDB last-write-wins (cobros)"
---

# ════════════════════════════════════════════════════════════
# FUNCIONAL VENDEDOR — Sync conflicto WatermelonDB con resolución
# last-write-wins en la colección `cobros`.
#
# Cubre el camino crítico del conflictResolver definido en
# apps/mobile-app/src/sync/syncEngine.ts (líneas 244–274):
#
#   if (table === 'cobros') {
#     const localTs = local?.updated_at ?? 0;
#     const remoteTs = remote?.updated_at ?? 0;
#     if (remoteTs > localTs) return remote;   // server-wins
#     return resolved;                          // client-wins
#   }
#
# Escenario (last-write-wins por updated_at en cobros):
#   1. Vendedor con sesión activa en device A (este emulador).
#   2. Existe un Cobro previo seedeado en backend con monto X.
#   3. Vendedor ACTIVA airplane mode (offline).
#   4. Vendedor edita el monto local del cobro → updated_at_local = t1.
#   5. Mientras tanto, en backend (simulado vía seed o admin web),
#      otro device "ganó la carrera" con updated_at_server = t2 > t1.
#   6. Vendedor desactiva airplane mode y dispara "Sincronizar ahora".
#   7. WDB conflictResolver compara timestamps → remote wins (server).
#   8. Pantalla Sincronización muestra "1 conflictos" en el summary
#      (lastSummary.conflicts > 0 → SyncStatusCard banner ámbar
#      con icono AlertTriangle, color #d97706, texto "X conflictos").
#   9. Pendientes regresa a 0 (push procesado, conflict resuelto
#      server-wins, sin loop infinito).
#
# Endpoints validados:
#   - POST /api/mobile/sync/push (200 OK, body.conflicts: [...])
#   - GET  /api/mobile/sync/pull (200 OK)
#   Ver apps/mobile/HandySuites.Mobile.Api/Endpoints/MobileSyncEndpoints.cs
#
# Strings UI validados contra:
#   apps/mobile-app/src/components/sync/SyncStatusCard.tsx (línea 243:
#     `{lastSummary.conflicts} conflictos`)
#   apps/mobile-app/app/(tabs)/sync.tsx (header "Sincronización",
#     ESTADO, DETALLES, "Sincronizar ahora")
#
# PRE-REQ runtime:
#   - Emulador Android emulator-5554 con Expo Go (host.exp.exponent).
#   - Metro bundler en puerto 8081 (`npx expo start --go --port 8081`).
#   - Sesión VENDEDOR activa (vendedor1@jeyma.com / test123).
#     Encadenar `.maestro/auth/01-login-vendedor.yaml` si standalone.
#   - Seed Jeyma con al menos un Cobro asociado a vendedor1 modificable.
#   - Scripts airplane mode disponibles en .maestro/scripts/.
#
# NOTA crítica sobre simulación del conflicto real:
#   Maestro NO puede mutar la fila server-side mientras el device está
#   offline (sería necesario un hook out-of-band: psql update o llamada
#   a admin web). Para hacer el test reproducible end-to-end con
#   `body.conflicts.length > 0`, se requiere uno de:
#     (a) Seed pre-test que deja la fila con updated_at > now() en SQL.
#     (b) Hook CI que ejecuta UPDATE entre airplane-on y airplane-off.
#     (c) Test colaborativo con un 2do device (no escalable en CI).
#
#   Este flow asume opción (a) o (b) — si la fila server no es más
#   reciente, el conflictResolver NO se dispara y el assert visual de
#   "conflictos" en el banner se SALTA con runFlow.when:visible
#   (degrada a happy-path sync sin conflicto, sin fallar el test).
#
# PROD BUG / FIX TODO:
#   - Sin el conflictResolver explícito (regression detectada
#     2026-06-03 incidente Rodrigo), el pull abortaba con
#     "Cannot update a record with pending changes
#      pedidos#qQyLko2m8rS8z4fb". Este test cubre la rama `cobros`
#     del fix pero NO la rama `pedidos` (estado ratchet) — un test
#     hermano `sync-conflicto-pedido-estado-ratchet.yaml` debería
#     cubrir el caso Borrador → Cancelado server-side.
#   - Maestro 1.x runScript con file relativo (`../../scripts/...`)
#     es frágil; CI debe garantizar cwd = apps/mobile-app/ y los
#     scripts deben ser ejecutables (chmod +x).
#   - El backend NO retorna conflictos estructurados aún (campo
#     `body.conflicts` siempre `[]` para `cobros`). Ver
#     MobileSyncEndpoints.cs línea 148 — el array existe pero el
#     populamiento server-side está PENDING. Hasta entonces, el
#     contador `conflictCount` en syncEngine.ts queda en 0 y el
#     banner ámbar no aparece — el test se degrada graciosamente.
# ════════════════════════════════════════════════════════════

# 0. NO clearState — preservar sesión VENDEDOR del flow previo.

# 1. Esperar dashboard "Hoy" hidratado tras login.
- extendedWaitUntil:
    visible: "Hoy"
    timeout: 30000

# 2. Dismiss modales opcionales post-login (permisos, aviso de privacidad).
- runFlow:
    when:
      visible: "Permitir"
    commands:
      - tapOn: "Permitir"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "AHORA NO"
    commands:
      - tapOn: "AHORA NO"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "Más tarde"
    commands:
      - tapOn: "Más tarde"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "Aviso de Privacidad"
    commands:
      - tapOn:
          text: "Cerrar"
          optional: true
      - waitForAnimationToEnd

- takeScreenshot: sync-conflicto-00-dashboard

# 3. Navegar Cobrar para preparar un cobro editable (precondición).
- tapOn: "Cobrar"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: ".*([Cc]obranza|[Ee]stado de [Cc]uenta|[Cc]obrar).*"
    timeout: 15000

- takeScreenshot: sync-conflicto-01-cobrar-tab

# 4. ACTIVAR OFFLINE — airplane mode.
#    Aquí es donde, fuera de banda, el seed/hook CI debe UPDATE
#    el cobro server-side con updated_at = now() para forzar el
#    conflicto detectable por el conflictResolver.
- runScript:
    file: "../../scripts/airplane-on.sh"
    env:
      ANDROID_SERIAL: "emulator-5554"

- takeScreenshot: sync-conflicto-02-airplane-on

# 5. Editar un cobro existente local — tap primera fila de la lista
#    de cobros visibles para entrar al detalle. Si el primer hit es
#    un cliente sin cobros, el assert posterior degrada.
- runFlow:
    when:
      visible: "Estado de cuenta"
    commands:
      - tapOn:
          text: "Estado de cuenta"
          optional: true
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "Historial"
    commands:
      - tapOn:
          text: "Historial"
          optional: true
      - waitForAnimationToEnd

# 6. Tap primer cobro registrado para abrirlo (si existe).
- runFlow:
    when:
      visible:
        text: ".*\\$.*"
    commands:
      - tapOn:
          point: "50%,45%"
      - waitForAnimationToEnd

- takeScreenshot: sync-conflicto-03-cobro-detalle

# 7. Forzar un cambio local en algún campo editable (notas / monto).
#    En modo offline, este cambio queda con _status='updated' en WDB
#    y se intentará pushear al volver online → genera el conflicto.
- runFlow:
    when:
      visible: "Editar"
    commands:
      - tapOn: "Editar"
      - waitForAnimationToEnd
      - runFlow:
          when:
            visible: "Notas"
          commands:
            - tapOn: "Notas"
            - inputText: "Edit offline QA conflicto 2026-06-07"
            - hideKeyboard
      - runFlow:
          when:
            visible: "Guardar"
          commands:
            - tapOn: "Guardar"
            - waitForAnimationToEnd

- takeScreenshot: sync-conflicto-04-edit-offline-saved

# 8. Navegar a tab Más → Sincronización para inspeccionar el estado.
- tapOn: "Más"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Sincronización"
    timeout: 15000

- tapOn: "Sincronización"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "ESTADO"
    timeout: 15000

- assertVisible: "Sincronización"
- assertVisible: "ESTADO"
- assertVisible: "DETALLES"

# 9. En modo offline el banner debe indicar "Sin conexión".
- assertVisible: "Sin conexión"
- assertVisible: "Pendientes"

- takeScreenshot: sync-conflicto-05-sync-screen-offline-pending

# 10. DESACTIVAR OFFLINE — restaurar conectividad y disparar el sync.
#     Es el momento donde el conflictResolver evalúa local vs remote.
- runScript:
    file: "../../scripts/airplane-off.sh"
    env:
      ANDROID_SERIAL: "emulator-5554"

- extendedWaitUntil:
    visible: "Conectado"
    timeout: 45000

- takeScreenshot: sync-conflicto-06-online-restored

# 11. Disparar sync manual → POST /api/mobile/sync/push.
- runFlow:
    when:
      visible: "Sincronizar ahora"
    commands:
      - tapOn: "Sincronizar ahora"

# 12. Esperar fin del sync — cualquier outcome terminal.
- extendedWaitUntil:
    visible:
      text: ".*(Sincronizado|Listo|0 pendientes|conflictos|¡Sincronizado!).*"
    timeout: 90000

- takeScreenshot: sync-conflicto-07-sync-finalizado

# 13. ASSERT CLAVE — banner "X conflictos" si el seed/hook server
#     dejó updated_at > local (rama last-write-wins server-wins).
#     SyncStatusCard.tsx renderiza esto en líneas 240-245.
- runFlow:
    when:
      visible:
        text: ".*conflictos.*"
    commands:
      - assertVisible:
          text: ".*conflictos.*"
      - takeScreenshot: sync-conflicto-08-banner-conflictos-server-wins
      # PROD BUG / FIX TODO: cuando el banner aparece, el usuario NO
      # tiene UI para inspeccionar qué entidades quedaron en conflicto
      # (qué cobro perdió la edición local). Solo se muestra el contador.
      # Roadmap: tap en el banner debería abrir modal con detalle.

# 14. RAMA DEGRADADA — si el hook server no aplicó el UPDATE,
#     el sync resuelve sin conflicto y el banner ámbar no aparece.
#     Validamos al menos que el push completó (0 pendientes).
- runFlow:
    when:
      notVisible:
        text: ".*conflictos.*"
    commands:
      - takeScreenshot: sync-conflicto-09-sync-sin-conflicto-degradado
      # En este branch, el cliente ganó (local updated_at > server o
      # updated_at iguales → resolved per-column). Es un outcome válido
      # del conflictResolver — el test no debe fallar, solo documenta.

# 15. Verificar que NO quedaron pendientes residuales tras el sync.
#     Independiente del outcome del conflict, el push debe completar.
- runFlow:
    when:
      visible:
        text: ".*(0 pendientes|Sin cambios|Sincronizado|¡Sincronizado!).*"
    commands:
      - assertVisible:
          text: ".*(0 pendientes|Sin cambios|Sincronizado|¡Sincronizado!).*"

- takeScreenshot: sync-conflicto-10-final

# ════════════════════════════════════════════════════════════
# POST-RUN MANUAL VERIFICATION (TODO en CI):
#
# 1) Validar que el cobro server-side conservó updated_at del lado
#    ganador (last-write-wins por timestamp):
#
#    SELECT id, monto, notas, actualizado_en
#      FROM "Cobros"
#      WHERE id = <cobro_id_bajo_prueba>
#        AND tenant_id = <tenant_jeyma>;
#
#    Resultado esperado (rama server-wins):
#      actualizado_en = timestamp del UPDATE out-of-band (> local edit).
#      notas != "Edit offline QA conflicto 2026-06-07" (server ganó).
#
#    Resultado esperado (rama client-wins / sin hook):
#      actualizado_en = timestamp del push del cliente.
#      notas = "Edit offline QA conflicto 2026-06-07".
#
# 2) Validar que NO hay duplicados (idempotencia del push):
#
#    SELECT count(*) FROM "Cobros"
#     WHERE notas LIKE 'Edit offline QA conflicto 2026-06-07%';
#
#    Resultado esperado: count <= 1.
#
# 3) Validar que el endpoint server retornó conflicts > 0 en el caso
#    server-wins. Inspeccionar response body en logs Seq:
#      level:Info | sourceContext:MobileSyncEndpoints
#      | message:~"push.*conflicts"
#
# 4) PROD BUG persistente: el campo body.Conflicts en MobileSyncEndpoints.cs
#    línea 148 está cableado pero no populated por el handler real para
#    la colección `cobros`. Hasta que el backend emita conflictos
#    estructurados, conflictCount permanecerá en 0 y el banner ámbar
#    NUNCA aparecerá — independiente del seed updated_at. Marcar como
#    KNOWN-LIMITATION del test E2E hasta resolver INT/sync ticket.
# ════════════════════════════════════════════════════════════
