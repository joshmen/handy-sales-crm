appId: com.handysuites.app
name: "EXT — Feature flag tracking GPS deshabilitado oculta toggle en Configuración"
---

# ════════════════════════════════════════════════════════════
# COBERTURA FUNCIONAL — Feature flag tracking_vendedor.
#
# Verifica el contrato del hook `useTrackingGpsEnabled`
# (apps/mobile-app/src/hooks/useTrackingGpsEnabled.ts):
#
#   - Backend expone `trackingGpsEnabled` en GET /api/mobile/empresa,
#     derivado de SubscriptionFeatureGuard.HasFeatureAsync(tenantId, "tracking_vendedor").
#   - Default fail-closed por privacidad: si el plan NO incluye el feature
#     (ej. tenant en plan FREE/BASIC), el hook devuelve false.
#   - configuracion.tsx renderiza la sección "Privacidad" + el switch
#     "Tracking GPS en segundo plano" SOLO si trackingGpsEnabled === true.
#
# Este flow es el inverso del happy-path en
# `.maestro/tracking/01-gps-background-toggle.yaml` (que asume plan PRO/BUSINESS).
# Aquí asumimos que el vendedor logueado pertenece a un tenant cuyo plan
# NO incluye tracking_vendedor — por lo que la sección debe estar OCULTA.
#
# PRE-REQUISITOS:
# - vendedor1@jeyma.com / test123 (seed). Si el plan del tenant Jeyma
#   tiene tracking_vendedor=true (caso real prod), este test fallará y
#   confirmará un PROD BUG: el flag está activo en un seed que el spec
#   esperaba sin tracking.
#
# Outcome esperado: en Configuración aparecen secciones Notificaciones,
# Datos, Acerca de — PERO NO aparece "Tracking GPS en segundo plano".
# ════════════════════════════════════════════════════════════

# 1. Login VENDEDOR via helper robusto (deja la app en el dashboard "Hoy").
- runFlow:
    file: ../../_helpers/login-as.yaml
    env:
      EMAIL: "vendedor1@jeyma.com"
      PASSWORD: "test123"

- takeScreenshot: ext-flag-tracking-dashboard

# 5. Navegar Más → Configuración.
- tapOn: "Más"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Configuración"
    timeout: 15000

- tapOn: "Configuración"
- waitForAnimationToEnd

# 6. Verificar header de la pantalla.
- assertVisible: "Configuración"

- takeScreenshot: ext-flag-tracking-config-top

# 7. Verificar que las secciones SIEMPRE-presentes están renderizadas
#    (Notificaciones + Datos + Acerca de). Esto confirma que la pantalla
#    cargó completa — no que el scroll esté mal posicionado.
- assertVisible: "Notificaciones"
- assertVisible: "Datos"

# Scroll para asegurar que cualquier sección debajo del fold se renderice.
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: UP
- waitForAnimationToEnd

- takeScreenshot: ext-flag-tracking-config-scrolled

# 8. CORE ASSERT — el toggle de tracking GPS background NO debe existir
#    cuando el feature flag está deshabilitado.
#
#    Si este assert falla en CI con vendedor1@jeyma, hay 2 escenarios:
#    (a) Plan del tenant Jeyma fue elevado a PRO/BUSINESS y se activó
#        tracking_vendedor — actualizar el seed/test para usar otro
#        tenant en plan FREE.
#    (b) PROD BUG: backend está devolviendo trackingGpsEnabled=true
#        para un tenant cuyo plan NO incluye el feature — investigar
#        SubscriptionFeatureGuard.HasFeatureAsync.
#
# PROD BUG / FIX TODO: si vendedor1@jeyma.com está en plan PRO/BUSINESS
# (incluye tracking), este test no cubrirá el flag-OFF path. Hay que
# crear un seed `vendedor1@huichol.com` o `vendedor1@centro.com` en plan
# FREE/BASIC explícito y migrar este test a esa credencial.
# El toggle de tracking GPS (label "Tracking GPS en segundo plano",
# accessibilityLabel "Tracking GPS background" en configuracion.tsx) solo
# se renderiza si el plan incluye tracking_vendedor.
- assertNotVisible: "Tracking GPS en segundo plano"
- assertNotVisible: "Tracking GPS background"
# Nota: NO se asserta assertNotVisible "Privacidad" — configuracion.tsx tiene
# una fila PERMANENTE "Privacidad" (Política de privacidad) dentro de "Acerca de"
# (línea 212), por lo que ese assert sería un falso negativo.

# 9. Verificar que las secciones de "Acerca de" siguen visibles tras
#    el scroll — confirma que el toggle ausente NO es consecuencia de
#    que la pantalla esté truncada.
- assertVisible: "Acerca de"
- assertVisible: "Versión"

- takeScreenshot: ext-flag-tracking-no-toggle

# 10. Volver al dashboard para dejar state limpio.
- tapOn:
    text: "Volver"
    optional: true
- waitForAnimationToEnd

- runFlow:
    when:
      visible: "Hoy"
    commands:
      - tapOn: "Hoy"
      - waitForAnimationToEnd

- takeScreenshot: ext-flag-tracking-done
