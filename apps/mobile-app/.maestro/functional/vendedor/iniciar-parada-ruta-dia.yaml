appId: com.handysuites.app
name: "Vendedor: Iniciar parada de la Ruta del Dia"
tags:
  - functional
  - vendedor
  - ruta
  - parada
---
# =================================================================
# E2E FUNCTIONAL — VENDEDOR
# Use case: iniciar-parada-ruta-dia
#
# Flujo:
#   tab Ruta -> "Ruta del Dia" -> (si aplica) "Aceptar" ruta
#   -> tap primera parada Pendiente -> pantalla Parada
#   -> auto check-in GPS dispara stop.arrive() (Pendiente -> En Progreso)
#   -> verificar header "Parada #1" + badge "En Progreso"
#   -> botones de accion ("Nuevo Pedido"/"Registrar Cobro"/"No se visito"
#      para preventa, o "Confirmar Entrega"/"No se entrego" para delivery)
#   -> volver a la lista y verificar status visible "En Progreso"
#
# Cobertura REAL: navega + ejecuta tap real + assertVisible el efecto
# (no solo screenshot). Si la ruta esta en estado 0 (Planificada) o 4
# (PendienteAceptar) se acepta primero — esto golpea
# rutasApi.aceptar() + rutasApi.iniciar() + ruta.startRoute() local
# en (tabs)/ruta/index.tsx.
#
# Strings reales validados contra:
#   apps/mobile-app/app/(tabs)/ruta/index.tsx
#   apps/mobile-app/app/(tabs)/ruta/parada/[detalleId].tsx
#
# Endpoints backend implicados:
#   POST /api/rutas/{id}/aceptar  -> transicion 0|4 -> 5
#   POST /api/rutas/{id}/iniciar  -> transicion 5|0 -> 1 (En Progreso)
#   PATCH /api/rutas/detalles/{id}/llegada -> stop pendiente -> en progreso
# (la parte movil empuja via syncEngine; el tap es lo que dispara
# el auto-arrive en mount).
#
# Pre-condicion: ejecutar antes
#   apps/mobile-app/.maestro/auth/01-login-vendedor.yaml
# (vendedor1@jeyma.com / test123) sobre seed Jeyma con una ruta
# asignada para el dia con al menos una parada Pendiente.
# =================================================================

# 0) Login VENDEDOR via helper robusto (deja dashboard "Hoy" cargado).
- runFlow:
    file: ../../_helpers/login-as.yaml
    env:
      EMAIL: "vendedor1@jeyma.com"
      PASSWORD: "test123"

# 1) Resetear el stack de navegacion (doble tap "Hoy" -> root).
- tapOn: "Hoy"
- tapOn: "Hoy"
- waitForAnimationToEnd

- takeScreenshot: iniciar-parada-00-dashboard

# 2) Navegar a la pantalla Ruta
# FIXME nav: vendedor no tiene tab Ruta (Tabs.Screen name="ruta" href:null en
# (tabs)/_layout.tsx). La ruta del dia se abre desde el card de ruta del
# dashboard Hoy, no desde la tab bar. Navegacion pendiente de verificar en emulador.
- assertVisible: "Ruta"
- tapOn: "Ruta"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Ruta del Día"
    timeout: 15000

- takeScreenshot: iniciar-parada-01-ruta-del-dia

# 3) Si la ruta esta Planificada o PendienteAceptar -> banner "Nueva
#    ruta asignada" + boton "Aceptar". Esto dispara rutasApi.aceptar +
#    rutasApi.iniciar + startRoute local (ver index.tsx linea 216-315).
- runFlow:
    when:
      visible: "Nueva ruta asignada"
    commands:
      - tapOn:
          text: "Aceptar"
      - extendedWaitUntil:
          visible: "Ruta aceptada"
          timeout: 15000
      - takeScreenshot: iniciar-parada-02-ruta-aceptada
      - waitForAnimationToEnd

# 4) Validar progreso visible y al menos una parada "Pendiente"
- assertVisible:
    text: "Paradas atendidas"
    optional: true

- assertVisible:
    text: "Pendiente"

- takeScreenshot: iniciar-parada-03-lista-paradas

# 5) Tap en la primera parada Pendiente.
#    El stopItem expone accessibilityLabel: "Parada {orden}: {cliente}, Pendiente"
- tapOn:
    text: "Parada 1:.*Pendiente"
    optional: true

# Fallback: si el accessibilityLabel no matcheo (por TalkBack off o
# Maestro mapeando el texto visible), tap por la fila visual del primer
# stop usando el nombre del cliente. Doble fallback: tap por el texto
# "Pendiente" (primer match es la parada 1).
- runFlow:
    when:
      visible: "Pendiente"
    commands:
      - tapOn:
          text: "Pendiente"
          index: 0

- waitForAnimationToEnd

# 6) Esperar pantalla Parada — header "Parada #N"
- extendedWaitUntil:
    visible: "Parada #"
    timeout: 15000

- takeScreenshot: iniciar-parada-04-detalle-parada

# 7) Verificar que cargo info del cliente
- assertVisible:
    text: "Cliente"

# 8) CRITICO: el useEffect en [detalleId].tsx llama stop.arrive() en
#    mount cuando location esta disponible y estado === 0. Esto
#    transiciona Pendiente (0) -> En Progreso (1). El badge en el
#    header debe reflejarlo.
#    PROD BUG / FIX TODO: si el emulador no tiene GPS mock activado,
#    location es null y arrive() nunca dispara. En ese caso el badge
#    queda "Pendiente" — el test contempla AMBOS estados con optional.
- assertVisible:
    text: "En Progreso|Pendiente"
    optional: true

- takeScreenshot: iniciar-parada-05-en-progreso

# 9) Verificar quick actions disponibles para parada activa.
#    Preventa: "Nuevo Pedido" / "Registrar Cobro" / "No se visito"
#    Delivery: "Confirmar Entrega" / "No se entrego"
- assertVisible:
    text: "Nuevo Pedido|Confirmar Entrega"

- assertVisible:
    text: "Registrar Cobro|No se entreg"
    optional: true

- assertVisible:
    text: "No se visit|No se entreg"
    optional: true

# 10) Verificar que NO hay error toast / crash
- assertNotVisible: "Parada no encontrada"
- assertNotVisible: "No se pudo"
- assertNotVisible: "Failed"

- takeScreenshot: iniciar-parada-06-acciones-disponibles

# 11) Volver a la lista de paradas (header back)
- tapOn:
    id: "back-button"
    optional: true

- runFlow:
    when:
      visible: "Parada #"
    commands:
      - back

- waitForAnimationToEnd

# 12) Confirmar regreso a "Ruta del Dia"
- extendedWaitUntil:
    visible: "Ruta del Día"
    timeout: 10000

- takeScreenshot: iniciar-parada-07-vuelta-lista

# 13) La parada 1 ahora debe mostrarse como "En Progreso" en la lista
#     (si el arrive() se ejecuto). Marcado optional por el caso GPS-null.
- assertVisible:
    text: "En Progreso|Pendiente"

# 14) Verificar que la sesion vendedor sigue activa (tab bar)
# Tab bar VENDEDOR real: Hoy, Mapa, Vender, Cobrar, Mas. NO existe tab "Ruta".
- assertVisible: "Vender"
- assertVisible: "Cobrar"
- assertVisible: "Mapa"
- assertVisible: "Hoy"

- takeScreenshot: iniciar-parada-08-flow-completo
