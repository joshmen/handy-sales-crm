appId: com.handysuites.app
name: "Sync - Pantalla con Pendientes"
---

# Ir al tab Mas
- tapOn: "Más"

- extendedWaitUntil:
    visible:
      text: "Sincronización"
      optional: true
    timeout: 15000

# Navegar a Sincronización
- tapOn:
    text: "Sincronización"

- extendedWaitUntil:
    visible:
      text: "ESTADO"
      optional: true
    timeout: 15000

# Verificar elementos principales de sync — Sprint 1 audit cambia el card layout
- assertVisible:
    text: "Sincronización"
    optional: true

# Status de conexion (online/offline)
- assertVisible:
    text: "Conectado"
    optional: true
- assertVisible:
    text: "Sin conexión"
    optional: true

# Sprint 1 SyncStatusCard nuevo: "Listo para sincronizar" / "Sincronizando..." / etc
- assertVisible:
    text: "Sincroniz"
    optional: true

- assertVisible:
    text: "Pendientes de sincronizar"
    optional: true

- takeScreenshot: sync-screen-status

# Verificar si hay fotos pendientes de subir
- assertVisible:
    text: "Fotos pendientes"
    optional: true

# Sprint v5 audit: "Sincronizar ahora" (lowercase ahora) o "Listo para sincronizar"
- assertVisible:
    text: "Sincronizar"
    optional: true

- takeScreenshot: sync-screen-full

# Scroll para ver resumen si existe
- scroll

- takeScreenshot: sync-screen-scrolled

# Volver al tab Mas
- tapOn:
    text: "Más"
    optional: true
