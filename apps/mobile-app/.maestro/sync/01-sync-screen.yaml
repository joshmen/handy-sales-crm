appId: host.exp.exponent
name: "Sync - Pantalla con Pendientes"
---

# Ir al tab Mas
- tapOn:
    id: "tab-mas"
    optional: true
- tapOn:
    text: "Mas"
    optional: true

- extendedWaitUntil:
    visible: "Navegaci"
    timeout: 15000

# Navegar a Sincronizacion
- tapOn: "Sincronizaci"

- extendedWaitUntil:
    visible: "Sincronizaci"
    timeout: 15000

# Verificar elementos principales de sync
- assertVisible: "Sincronizaci"

# Status de conexion (online/offline)
- assertVisible:
    text: "Conectado"
    optional: true
- assertVisible:
    text: "Sin conexi"
    optional: true

# Verificar ultima sincronizacion
- assertVisible:
    text: "sincronizaci"
    optional: true

# Verificar pendientes de sincronizar
- assertVisible:
    text: "Pendientes de sincronizar"
    optional: true

- takeScreenshot: sync-screen-status

# Verificar si hay fotos pendientes de subir (MOB-4 feature)
# Esta seccion solo aparece si hay attachments pendientes
- assertVisible:
    text: "Fotos pendientes de subir"
    optional: true

# Verificar boton de sincronizar
- assertVisible: "Sincronizar Ahora"

- takeScreenshot: sync-screen-full

# Scroll para ver resumen si existe
- scroll

- takeScreenshot: sync-screen-scrolled

# Volver al tab Mas
- tapOn:
    id: "tab-mas"
    optional: true
- tapOn:
    text: "Mas"
    optional: true
