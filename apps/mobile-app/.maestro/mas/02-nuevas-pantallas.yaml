appId: com.handysuites.app
---
# Navegar a pantallas de la sección CUENTA bajo el tab "Más". Tras cada
# sub-pantalla re-tapeamos el tab "Más" (pop al root del menú) para volver de
# forma confiable — el doble-back anterior sobre-navegaba al dashboard.

- tapOn: "Más"
- assertVisible: "Clientes"

# Notificaciones (sección CUENTA, bajo el fold → scroll)
- scrollUntilVisible:
    element:
      text: "Notificaciones"
    direction: DOWN
- tapOn: "Notificaciones"
- assertVisible: "Notificaciones"

# Volver al menú Más → Ayuda
- tapOn: "Más"
- scrollUntilVisible:
    element:
      text: "Ayuda"
    direction: DOWN
- tapOn: "Ayuda"
- assertVisible: "PREGUNTAS FRECUENTES"
- assertVisible: "CONTACTO"

# Volver al menú Más → Acerca de
- tapOn: "Más"
- scrollUntilVisible:
    element:
      text: "Acerca de"
    direction: DOWN
- tapOn: "Acerca de"
# El título real es "Handy Suites®"; Maestro hace match completo → comodín.
- assertVisible:
    text: ".*Handy Suites.*"
- assertVisible: "Términos de Servicio"

# Volver al menú Más. El menú retiene el scroll de "Acerca de" (abajo), así que
# subimos hasta "Clientes" (arriba) para confirmar el regreso al root.
- tapOn: "Más"
- scrollUntilVisible:
    element:
      text: "Clientes"
    direction: UP
