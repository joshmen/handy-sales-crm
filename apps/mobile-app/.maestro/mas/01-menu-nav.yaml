appId: com.handysuites.app
name: "Mas - Menu y Navegacion"
---

# Ir al tab "Más" (con acento — antes el flow buscaba "Mas"/tab-mas inexistentes)
- tapOn: "Más"

- extendedWaitUntil:
    visible: "NAVEGACIÓN"
    timeout: 15000

# Items del menú NAVEGACIÓN (estructura actual de la app)
- assertVisible: "Clientes"
- assertVisible: "Pedidos"
- assertVisible: "Productos"
- assertVisible: "Inventario"
- assertVisible: "Historial de Rutas"
- assertVisible: "Sincronización"

- takeScreenshot: mas-menu-full

# Navegar a Sincronización
- tapOn: "Sincronización"

- extendedWaitUntil:
    visible: "Sincronización"
    timeout: 15000

- takeScreenshot: sync-screen

# Volver al tab Más
- tapOn: "Más"

- extendedWaitUntil:
    visible: "NAVEGACIÓN"
    timeout: 15000
