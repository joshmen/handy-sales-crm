appId: host.exp.exponent
name: "Mas - Menu y Navegacion"
---

# Ir al tab Mas
- tapOn:
    id: "tab-mas"
    optional: true
- tapOn:
    text: "Mas"
    optional: true

- extendedWaitUntil:
    visible: "Navegaci"
    timeout: 15000

# Verificar items del menu principal
- assertVisible: "Clientes"
- assertVisible: "Pedidos"
- assertVisible: "Ruta del D"
- assertVisible: "Sincronizaci"

# Verificar items de cuenta
- assertVisible: "Mi Perfil"
- assertVisible: "Configuraci"

- takeScreenshot: mas-menu-full

# Navegar a Configuracion
- tapOn: "Configuraci"

- extendedWaitUntil:
    visible: "Configuraci"
    timeout: 15000

- assertVisible: "Notificaciones push"
- assertVisible: "Sincronizaci"

- takeScreenshot: configuracion-screen

# Volver al tab Mas
- tapOn:
    id: "tab-mas"
    optional: true
- tapOn:
    text: "Mas"
    optional: true

- extendedWaitUntil:
    visible: "Navegaci"
    timeout: 15000

# Navegar a Sincronizacion
- tapOn: "Sincronizaci"

- extendedWaitUntil:
    visible: "Sincronizaci"
    timeout: 15000

- assertVisible: "Sincronizar Ahora"

- takeScreenshot: sync-screen

# Volver al tab Mas
- tapOn:
    id: "tab-mas"
    optional: true
- tapOn:
    text: "Mas"
    optional: true
