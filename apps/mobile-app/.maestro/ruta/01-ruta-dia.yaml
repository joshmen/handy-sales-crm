appId: com.handysuites.app
name: "Historial de Rutas"
---

# Login VENDEDOR via helper (la sesion NO persiste en cold-start: el runner
# relanza a la pantalla de login). Deja el dashboard "Hoy" cargado.
- runFlow:
    file: ../_helpers/login-as.yaml
    env:
      EMAIL: "vendedor1@jeyma.com"
      PASSWORD: "test123"

# Rutas vive bajo el tab "Más" → NAVEGACIÓN → "Historial de Rutas"
- tapOn: "Más"

- extendedWaitUntil:
    visible: "NAVEGACIÓN"
    timeout: 15000

- tapOn: "Historial de Rutas"

- extendedWaitUntil:
    visible: "Historial de Rutas"
    timeout: 15000

- takeScreenshot: historial-rutas

# Scroll para ver el contenido
- scroll

- takeScreenshot: historial-rutas-scrolled
