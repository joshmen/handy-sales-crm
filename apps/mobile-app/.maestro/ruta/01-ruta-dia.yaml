appId: host.exp.exponent
name: "Ruta del Dia"
---

# Ir al tab Mas
- tapOn:
    id: "tab-mas"
    optional: true
- tapOn:
    text: "Mas"
    optional: true

- extendedWaitUntil:
    visible: "Navegaci"
    timeout: 15000

# Tap en Ruta del Dia
- tapOn: "Ruta del D"

- extendedWaitUntil:
    visible: "Ruta del D"
    timeout: 15000

- takeScreenshot: ruta-dia

# Scroll para ver paradas
- scroll

- takeScreenshot: ruta-dia-scrolled

# Volver al tab Mas
- tapOn:
    id: "tab-mas"
    optional: true
- tapOn:
    text: "Mas"
    optional: true
