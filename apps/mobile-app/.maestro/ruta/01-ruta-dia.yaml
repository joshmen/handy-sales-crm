appId: com.handysuites.app
name: "Historial de Rutas"
---

# Rutas vive bajo el tab "Más" → NAVEGACIÓN → "Historial de Rutas"
- tapOn: "Más"

- extendedWaitUntil:
    visible: "NAVEGACIÓN"
    timeout: 15000

- tapOn: "Historial de Rutas"

- extendedWaitUntil:
    visible: "Historial de Rutas"
    timeout: 15000

- takeScreenshot: historial-rutas

# Scroll para ver el contenido
- scroll

- takeScreenshot: historial-rutas-scrolled
