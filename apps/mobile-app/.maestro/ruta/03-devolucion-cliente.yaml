appId: host.exp.exponent
name: "Registrar devolucion cliente desde parada Completada"
---

# Pre-requisito: vendedor con ruta del día que tenga al menos 1 parada con
# pedido entregado (estado=2). El flow:
# 1. Login vendedor
# 2. Tab Ruta → seleccionar parada Completada con pedido
# 3. CTA "Registrar devolucion" debe aparecer
# 4. Abrir screen → marcar 1 producto cantidad 1 → motivo → tipo reembolso → guardar
# 5. Verificar toast success + back a parada

# Skip onboarding si está visible
- runFlow:
    when:
      visible: "Omitir"
    commands:
      - tapOn: "Omitir"
      - waitForAnimationToEnd

# Login
- extendedWaitUntil:
    visible:
      id: "login-button"
    timeout: 30000

- tapOn:
    id: "email-input"
- eraseText: 50
- inputText: "vendedor1@jeyma.com"
- hideKeyboard

- tapOn:
    id: "password-input"
- eraseText: 50
- inputText: "test123"
- hideKeyboard

- tapOn:
    id: "login-button"

# Espera dashboard
- extendedWaitUntil:
    visible: "Hoy"
    timeout: 45000

# Navegar a tab Ruta
- tapOn: "Ruta"
- waitForAnimationToEnd

# Tap en primera parada (asumimos hay paradas en el seed; si la primera ya
# esta Completada, el CTA debe ser visible).
- tapOn:
    point: "50%,55%"
- waitForAnimationToEnd

- takeScreenshot: parada-detail

# Si la parada esta Completada y tiene pedido, debe aparecer "Registrar devolucion"
- assertVisible: "Registrar devolucion"

- tapOn:
    id: "btn-registrar-devolucion"

- extendedWaitUntil:
    visible:
      id: "devolucion-screen"
    timeout: 15000

- takeScreenshot: devolucion-screen-open

# Captura cantidad 1 del primer item via plus button
- tapOn:
    id: "item-0-plus"

# Verifica que el subtotal aparezca (significa qty > 0)
- assertVisible: "Subtotal:"

# Seleccionar motivo "Dano transporte" (value=0)
- tapOn:
    id: "motivo-0"

# Tipo reembolso "Saldo a favor" (value=0) — ya default pero re-confirmar
- tapOn:
    id: "reembolso-0"

# Captura notas
- tapOn:
    id: "input-notas"
- inputText: "Test maestro devolucion"
- hideKeyboard

- takeScreenshot: devolucion-form-filled

# Guardar
- tapOn:
    id: "btn-save"

# Verifica toast success + regresa a parada detail
- extendedWaitUntil:
    visible: "Devolucion registrada"
    timeout: 10000

- takeScreenshot: devolucion-saved
