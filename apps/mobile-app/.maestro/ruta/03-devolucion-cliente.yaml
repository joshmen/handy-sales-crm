appId: com.handysuites.app
name: "Registrar devolucion cliente desde parada Completada"
---

# Asume sesión vendedor1 activa (el runner preserva la sesión). Antes hacía un
# login completo que fallaba al estar ya logueado (login-button no visible).
#
# Precondición real: una ruta del día con parada Completada + pedido entregado.
# Si vendedor1 no tiene ruta hoy, el flujo navega a Historial de Rutas y la
# devolución queda condicional (no falla por falta de data).

# Navegar a Rutas vía Más → NAVEGACIÓN → Historial de Rutas (no existe tab "Ruta")
- tapOn: "Más"
- extendedWaitUntil:
    visible: "NAVEGACIÓN"
    timeout: 15000
- tapOn: "Historial de Rutas"
- extendedWaitUntil:
    visible: "Historial de Rutas"
    timeout: 15000

- takeScreenshot: rutas-historial

# Si hay una ruta/parada con CTA de devolución disponible, probar el flujo completo.
# (Condicional: sólo corre si la data existe — evita falso fallo cuando no hay ruta.)
- runFlow:
    when:
      visible: "Registrar devolucion"
    commands:
      - tapOn:
          id: "btn-registrar-devolucion"
      - extendedWaitUntil:
          visible:
            id: "devolucion-screen"
          timeout: 15000
      - tapOn:
          id: "item-0-plus"
      - assertVisible: "Subtotal:"
      - tapOn:
          id: "motivo-0"
      - tapOn:
          id: "reembolso-0"
      - tapOn:
          id: "input-notas"
      - inputText: "Test maestro devolucion"
      - hideKeyboard
      - takeScreenshot: devolucion-form-filled
      - tapOn:
          id: "btn-save"
      - extendedWaitUntil:
          visible: "Devolucion registrada"
          timeout: 10000
      - takeScreenshot: devolucion-saved
