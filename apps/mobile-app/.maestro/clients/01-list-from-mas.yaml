appId: host.exp.exponent
name: "Clientes - Acceder desde Mas"
---

# Ir al tab Mas
- tapOn:
    id: "tab-mas"
    optional: true
- tapOn:
    text: "Mas"
    optional: true

- extendedWaitUntil:
    visible: "Navegaci"
    timeout: 15000

- takeScreenshot: mas-menu

# Tap en Clientes
- tapOn: "Clientes"

- extendedWaitUntil:
    visible: "Clientes"
    timeout: 15000

- takeScreenshot: clients-list

# Scroll la lista
- scroll

- takeScreenshot: clients-list-scrolled
