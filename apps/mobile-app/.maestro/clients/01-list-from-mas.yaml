appId: com.handysuites.app
name: "Clientes - Acceder desde Mas"
---

# Ir al tab Más
- tapOn: "Más"

- extendedWaitUntil:
    visible: "NAVEGACIÓN"
    timeout: 15000

- takeScreenshot: mas-menu

# Tap en Clientes
- tapOn: "Clientes"

- extendedWaitUntil:
    visible: "Clientes"
    timeout: 15000

- takeScreenshot: clients-list

# Scroll la lista
- scroll

- takeScreenshot: clients-list-scrolled
