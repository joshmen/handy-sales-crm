appId: com.handysuites.app
name: "Clientes - Lista"
---

# Clientes ya no es bottom tab — vive bajo el tab "Más" → NAVEGACIÓN
- tapOn: "Más"

- extendedWaitUntil:
    visible: "NAVEGACIÓN"
    timeout: 15000

- tapOn: "Clientes"

# Pantalla de Clientes cargada
- extendedWaitUntil:
    visible: "Clientes"
    timeout: 15000

- takeScreenshot: clients-list

# Scroll la lista
- scroll

- takeScreenshot: clients-list-scrolled
