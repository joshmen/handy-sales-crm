appId: com.handysuites.app
name: "Vendedor: Flujo de venta acelerada — Cercanos + Numeric Sheet + Last Metodo"
---

# ════════════════════════════════════════════════════════════
# PREREQ: ya logueado como vendedor1@jeyma.com
# Valida los 4 cambios UX recientes:
#   - Modo venta default ('Preguntar' → BottomSheet, otros → directo)
#   - Sección "Cercanos a ti" o "Recientes" en pantalla cliente
#   - QuantityNumericSheet en agregar producto
#   - Last metodo pago pre-seleccionado en revisión
# ════════════════════════════════════════════════════════════

# Reset al tab Vender
- tapOn: "Vender"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Pedidos"
    timeout: 15000

# ────────────────────────────────────────────
# PASO 1: FAB Nuevo Pedido
# ────────────────────────────────────────────
- tapOn:
    id: "fab-nuevo-pedido"
- waitForAnimationToEnd

# Selector de modo → Venta Directa: este flujo prueba el pago (Efectivo /
# "Cobrar y Entregar"), que es el camino de venta directa. Preventa no tiene
# paso de pago (su revisión es "Registrar Pedido").
- tapOn: "Venta Directa"
- waitForAnimationToEnd

# ────────────────────────────────────────────
# PASO 2: Pantalla Cliente — verificar Cercanos / Recientes
# ────────────────────────────────────────────
- extendedWaitUntil:
    visible: "Cliente"
    timeout: 10000

- takeScreenshot: "va-02-clientes"

# Al menos UNA de estas secciones debe estar visible: cercanos o recientes.
# Si GPS está disponible y hay clientes con coords cerca → "Cercanos a ti"
# Si vendedor ya tiene historial → "Recientes"
# (no es strict assert — puede que el seed no tenga ninguna; aceptamos N/A)
- assertVisible:
    text: "Cercanos a ti|Recientes|Cliente"
    optional: true

# ────────────────────────────────────────────
# PASO 3: Tap primer cliente
# ────────────────────────────────────────────
- tapOn: "Abarrotes La Esquina"
- waitForAnimationToEnd
- tapOn: "Continuar"
- waitForAnimationToEnd

# ────────────────────────────────────────────
# PASO 4: Productos — verificar Numeric Sheet
# ────────────────────────────────────────────
- extendedWaitUntil:
    visible: "Productos"
    timeout: 10000

- takeScreenshot: "va-03-productos"

# Tap card de producto debe abrir QuantityNumericSheet
- tapOn: "Agregar"
- waitForAnimationToEnd

- takeScreenshot: "va-04-numeric-sheet"

# Numeric sheet debería mostrar teclado numérico — tap '5'
- tapOn:
    text: "5"
    optional: true
- waitForAnimationToEnd

# Confirmar cantidad (✓ o "Agregar" según design)
- tapOn:
    text: "Agregar|Confirmar|✓"
    optional: true
- waitForAnimationToEnd

- takeScreenshot: "va-05-producto-agregado"

# ────────────────────────────────────────────
# PASO 5: CartBar → Revisión
# ────────────────────────────────────────────
- tapOn: "Revisar pedido"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Subtotal"
    timeout: 10000

- takeScreenshot: "va-06-revision"

# Verificar el total del pedido en la revisión
- assertVisible: "Total"

# ────────────────────────────────────────────
# PASO 6: Cobrar y Entregar → modal de confirmación de venta directa
# ────────────────────────────────────────────
# El método de pago (Efectivo) NO está en la revisión; tras "Cobrar y Entregar"
# aparece un modal "¿Confirmar venta directa...? Total: $X" con Cancelar / Cobrar.
- tapOn: "Cobrar y Entregar"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Cancelar"
    timeout: 10000

- takeScreenshot: "va-07-confirm-modal"

# NO completamos la venta — evita crear una orden/cobro real en staging.
- tapOn: "Cancelar"
- waitForAnimationToEnd
