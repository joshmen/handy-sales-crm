appId: host.exp.exponent
name: "Vendedor: Flujo de venta acelerada — Cercanos + Numeric Sheet + Last Metodo"
---

# ════════════════════════════════════════════════════════════
# PREREQ: ya logueado como vendedor1@jeyma.com
# Valida los 4 cambios UX recientes:
#   - Modo venta default ('Preguntar' → BottomSheet, otros → directo)
#   - Sección "Cercanos a ti" o "Recientes" en pantalla cliente
#   - QuantityNumericSheet en agregar producto
#   - Last metodo pago pre-seleccionado en revisión
# ════════════════════════════════════════════════════════════

# Reset al tab Vender
- tapOn: "Vender"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Pedidos"
    timeout: 15000

# ────────────────────────────────────────────
# PASO 1: FAB Nuevo Pedido
# ────────────────────────────────────────────
- tapOn:
    id: "fab-nuevo-pedido"
- waitForAnimationToEnd

# Si modo default es "Preguntar", aparece BottomSheet con opciones.
# Si el admin ya eligió Preventa/VentaDirecta, salta directo a Cliente.
- runFlow:
    when:
      visible: "Tipo de Venta"
    commands:
      - takeScreenshot: "va-01-bottom-sheet-tipo"
      - tapOn: "Preventa"
      - waitForAnimationToEnd

# ────────────────────────────────────────────
# PASO 2: Pantalla Cliente — verificar Cercanos / Recientes
# ────────────────────────────────────────────
- extendedWaitUntil:
    visible: "Cliente"
    timeout: 10000

- takeScreenshot: "va-02-clientes"

# Al menos UNA de estas secciones debe estar visible: cercanos o recientes.
# Si GPS está disponible y hay clientes con coords cerca → "Cercanos a ti"
# Si vendedor ya tiene historial → "Recientes"
# (no es strict assert — puede que el seed no tenga ninguna; aceptamos N/A)
- assertVisible:
    text: "Cercanos a ti|Recientes|Cliente"
    optional: true

# ────────────────────────────────────────────
# PASO 3: Tap primer cliente
# ────────────────────────────────────────────
- tapOn: "Abarrotes Don Pancho"
- waitForAnimationToEnd
- tapOn: "Continuar"
- waitForAnimationToEnd

# ────────────────────────────────────────────
# PASO 4: Productos — verificar Numeric Sheet
# ────────────────────────────────────────────
- extendedWaitUntil:
    visible: "Productos"
    timeout: 10000

- takeScreenshot: "va-03-productos"

# Tap card de producto debe abrir QuantityNumericSheet
- tapOn: "Agregar"
- waitForAnimationToEnd

- takeScreenshot: "va-04-numeric-sheet"

# Numeric sheet debería mostrar teclado numérico — tap '5'
- tapOn:
    text: "5"
    optional: true
- waitForAnimationToEnd

# Confirmar cantidad (✓ o "Agregar" según design)
- tapOn:
    text: "Agregar|Confirmar|✓"
    optional: true
- waitForAnimationToEnd

- takeScreenshot: "va-05-producto-agregado"

# ────────────────────────────────────────────
# PASO 5: CartBar → Revisión
# ────────────────────────────────────────────
- tapOn: "Revisar pedido"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Subtotal"
    timeout: 10000

- takeScreenshot: "va-06-revision"

# Verificar que algún método de pago aparece pre-seleccionado.
# En la primera ejecución del usuario no hay last_metodo_pago_<id>, así
# que el modal de pago aparecerá. En la segunda ejecución debería estar
# pre-seleccionado el método de la venta anterior (efectivo por default).
- assertVisible: "Efectivo"

# ────────────────────────────────────────────
# PASO 6: Confirmar venta
# ────────────────────────────────────────────
- tapOn: "Efectivo"
- waitForAnimationToEnd
- tapOn:
    text: "Cobrar y Entregar|Confirmar|Crear Pedido"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Venta Completada|Pedido Creado"
    timeout: 15000

- takeScreenshot: "va-07-confirmacion"

# ────────────────────────────────────────────
# PASO 7: Volver al listado y verificar que aparece
# ────────────────────────────────────────────
- tapOn: "Listo"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Pedidos"
    timeout: 15000

- takeScreenshot: "va-08-listado-final"
