appId: com.handysuites.app
name: "Cobrar - Saldos Pendientes"
---

# Login VENDEDOR via helper (la sesion NO persiste en cold-start: el runner
# relanza a la pantalla de login). Deja el dashboard "Hoy" cargado.
- runFlow:
    file: ../_helpers/login-as.yaml
    env:
      EMAIL: "vendedor1@jeyma.com"
      PASSWORD: "test123"

# Ir al tab Cobrar
- tapOn: "Cobrar"

- extendedWaitUntil:
    visible: "Cobranza"
    timeout: 15000

- takeScreenshot: cobrar-saldos

# Verificar resumen de cartera
- assertVisible:
    text: "Facturado"
    optional: true
- assertVisible:
    text: "Cobrado"
    optional: true
- assertVisible:
    text: "Pendiente"
    optional: true

# Scroll para ver lista de clientes
- scroll

- takeScreenshot: cobrar-saldos-scrolled
