appId: com.handysuites.app
name: "Cobrar - Modo Abono a cuenta FIFO"
---

# PR 5 cobros 3 modos: valida modo AbonoFifo (selector + ConfirmModal con
# titulo "Abono a cuenta" + mensaje de distribucion automatica).

- tapOn: "Cobrar"

- extendedWaitUntil:
    visible: "Cobranza"
    timeout: 15000

- tapOn:
    text: "Registrar Cobro"
    optional: true

- extendedWaitUntil:
    visible: "Tipo de cobro"
    timeout: 10000

# Tap en boton modo AbonoFifo (testID="cobro-modo-1")
- tapOn:
    id: "cobro-modo-1"

- takeScreenshot: cobrar-modo-fifo-selected

# Modo AbonoFifo filtra clientes con saldo>0 (igual que PorPedido). Abrir
# picker y tap por nombre (index 0 no era confiable).
- tapOn:
    text: "Seleccionar cliente"
- extendedWaitUntil:
    visible: "Abarrotes La Esquina"
    timeout: 8000
- tapOn: "Abarrotes La Esquina"
- waitForAnimationToEnd

- tapOn:
    text: "0.00"
    optional: true
- inputText: "200"
- hideKeyboard

- takeScreenshot: cobrar-modo-fifo-filled

# Tap Confirmar (botón = "Confirmar Cobro · $X" → regex con comodín)
- tapOn:
    text: "Confirmar Cobro.*"

- extendedWaitUntil:
    visible: "Abono a cuenta"
    timeout: 5000

- assertVisible:
    text: "Abono a cuenta"
# El body es una frase larga; Maestro hace match completo → regex con comodines.
- assertVisible:
    text: ".*distribuir.*autom.*"

- takeScreenshot: cobrar-modo-fifo-confirmmodal

# Cancelar modal y volver
- tapOn:
    text: "Cancelar"
    optional: true
- back
- tapOn: "Cobrar"
