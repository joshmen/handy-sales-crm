appId: com.handysuites.app
name: "Cobrar - Modo Pago de pedido (default)"
---

# PR 5 cobros 3 modos: valida que el selector default es PorPedido + el
# ConfirmModal sea "Confirmar Cobro" normal (NO saldo a favor).

- tapOn: "Cobrar"

- extendedWaitUntil:
    visible: "Cobranza"
    timeout: 15000

- tapOn:
    text: "Registrar Cobro"
    optional: true

- extendedWaitUntil:
    visible: "Tipo de cobro"
    timeout: 10000

# Verificar que PorPedido es el default (selected state)
- assertVisible:
    text: "Pago de pedido"

- takeScreenshot: cobrar-modo-por-pedido-default

# Modo PorPedido filtra clientes con saldo>0. Abrir picker y tap por nombre
# (Abarrotes La Esquina tiene saldo en el seed; index 0 no era confiable).
- tapOn:
    text: "Seleccionar cliente"
- extendedWaitUntil:
    visible: "Abarrotes La Esquina"
    timeout: 8000
- tapOn: "Abarrotes La Esquina"
- waitForAnimationToEnd

# Modo PorPedido EXIGE seleccionar un pedido con saldo del cliente. Abrir el
# picker y tap al primer pedido (regex "Pedido .*" → no depende del folio/fecha
# del seed). Sin pedido el botón Confirmar queda disabled y no abre el modal.
- tapOn:
    text: "Seleccionar pedido"
- extendedWaitUntil:
    visible: "Seleccionar Pedido"
    timeout: 8000
- tapOn:
    text: "Pedido .*"
- waitForAnimationToEnd

# Monto pequeño (<= saldo de cualquier pedido del cliente) para no exceder y
# dejar el botón Confirmar habilitado.
- tapOn:
    text: "0.00"
    optional: true
- inputText: "10"
- hideKeyboard

- takeScreenshot: cobrar-modo-por-pedido-filled

# Tap Confirmar (botón = "Confirmar Cobro · $X" → regex con comodín)
- tapOn:
    text: "Confirmar Cobro.*"

# El modal de confirmación expone botones "Cancelar"/"Confirmar" (elemento
# estable en los 3 modos); su título varía por modo.
- extendedWaitUntil:
    visible: "Cancelar"
    timeout: 5000

# Cancelar modal y volver
- tapOn:
    text: "Cancelar"
    optional: true
- back
- tapOn: "Cobrar"
