appId: com.handysuites.app
name: "Vender - Lista Pedidos"
---

# Login VENDEDOR via helper (la sesion NO persiste en cold-start: el runner
# relanza a la pantalla de login). Deja el dashboard "Hoy" cargado.
- runFlow:
    file: ../_helpers/login-as.yaml
    env:
      EMAIL: "vendedor1@jeyma.com"
      PASSWORD: "test123"

# Ir al tab Vender
- tapOn: "Vender"

- extendedWaitUntil:
    visible: "Pedidos"
    timeout: 15000

- takeScreenshot: vender-pedidos-list

# Verificar filtros de estado
- assertVisible:
    text: "Todos"
    optional: true

# Scroll la lista
- scroll

- takeScreenshot: vender-pedidos-scrolled
