appId: com.handysuites.app
---

# Login VENDEDOR via helper (la sesion NO persiste en cold-start: el runner
# relanza a la pantalla de login). Deja el dashboard "Hoy" cargado.
- runFlow:
    file: ../_helpers/login-as.yaml
    env:
      EMAIL: "vendedor1@jeyma.com"
      PASSWORD: "test123"
# Test: Verify back navigation is prevented during order creation flow
# Prerequisite: User logged in, on Vender tab

- tapOn: "Vender"
- assertVisible: "Pedidos"

# Start new order via FAB (id real: fab-nuevo-pedido, no "fab-button")
- tapOn:
    id: "fab-nuevo-pedido"
- waitForAnimationToEnd

# Mode selection: Preventa
- tapOn:
    text: "Preventa"
- waitForAnimationToEnd

# Select client step (permisos ya otorgados → sin dialogo de ubicacion)
- extendedWaitUntil:
    visible: "Cliente"
    timeout: 15000

# Select first client
- tapOn:
    text: "Ferretería El Martillo"
    optional: true

# Should NOT be able to swipe back (gestureEnabled: false)
# Continue to products if client selected
- tapOn:
    text: "Continuar"
    optional: true
