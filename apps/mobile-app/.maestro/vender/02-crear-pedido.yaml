appId: com.handysuites.app
name: "Vender - Flujo Crear Pedido"
---

# Login VENDEDOR via helper (la sesion NO persiste en cold-start: el runner
# relanza a la pantalla de login). Deja el dashboard "Hoy" cargado.
- runFlow:
    file: ../_helpers/login-as.yaml
    env:
      EMAIL: "vendedor1@jeyma.com"
      PASSWORD: "test123"

# Asegurarse de estar en tab Vender
- tapOn: "Vender"

- extendedWaitUntil:
    visible: "Pedidos"
    timeout: 15000

# Navegar a crear pedido - tap boton "+" o "Nuevo Pedido"
- tapOn:
    text: "Nuevo Pedido"
    optional: true

# Paso 1: Seleccionar cliente
- extendedWaitUntil:
    visible: "Seleccionar Cliente"
    timeout: 15000
    optional: true

- takeScreenshot: crear-pedido-paso1

# Regresar sin completar (no queremos enviar pedido real en E2E)
- back

- takeScreenshot: vender-after-back
