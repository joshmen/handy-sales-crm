appId: host.exp.exponent
name: "Onboarding - Skip or Complete"
---

# Wait for bundle to load (splash -> onboarding or login)
- extendedWaitUntil:
    visible: "Omitir|Vende en ruta|Iniciar Sesi"
    timeout: 60000

# Swipe left through 3 onboarding slides (more reliable than tap)
- swipe:
    direction: LEFT
    duration: 400
- swipe:
    direction: LEFT
    duration: 400
- swipe:
    direction: LEFT
    duration: 400

# Tap Comenzar (last slide) or Omitir (any slide) via point
# "Comenzar"/"Siguiente" button is at bottom center ~y=2150
- tapOn:
    point: "540,2150"
    optional: true

# Fallback: tap "Omitir" link at top-right ~y=100
- tapOn:
    text: "Omitir"
    optional: true

# Wait for login screen (use partial text to avoid encoding issues)
- extendedWaitUntil:
    visible: "Iniciar Sesi"
    timeout: 30000

- takeScreenshot: post-onboarding-login
