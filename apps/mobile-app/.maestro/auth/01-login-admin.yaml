appId: host.exp.exponent
name: "Login Admin Jeyma"
---

# Wait for login screen (partial text avoids encoding issues with accent)
- extendedWaitUntil:
    visible: "Iniciar Sesi"
    timeout: 30000

- takeScreenshot: login-screen

# Fill email by testID
- tapOn:
    id: "email-input"
- eraseText: 50
- inputText: "admin@jeyma.com"

- hideKeyboard

# Fill password by testID
- tapOn:
    id: "password-input"
    retryTapIfNoChange: true
- eraseText: 50
- inputText: "test123"

- hideKeyboard
- takeScreenshot: login-filled

# Tap login button by testID
- tapOn:
    id: "login-button"

# Wait for dashboard (tab Hoy)
- extendedWaitUntil:
    visible: "Hoy"
    timeout: 45000

- takeScreenshot: login-success-hoy
