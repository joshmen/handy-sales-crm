appId: host.exp.exponent
name: "Logout"
---

# Ir al tab Mas (logout esta ahi)
- tapOn:
    id: "tab-mas"
    optional: true
- tapOn:
    text: "Mas"
    optional: true

- extendedWaitUntil:
    visible: "Navegaci"
    timeout: 15000

- takeScreenshot: mas-before-logout

# Scroll para ver el boton Cerrar Sesion (esta al final)
- scrollUntilVisible:
    element: "Cerrar Sesi"
    direction: DOWN
    timeout: 10000

# Tap logout
- tapOn: "Cerrar Sesi"

# Confirmar si hay alert
- tapOn:
    text: "Si"
    optional: true

- tapOn:
    text: "Cerrar Sesi"
    optional: true

- tapOn:
    text: "OK"
    optional: true

# Esperar que vuelva al login
- extendedWaitUntil:
    visible: "Iniciar Sesi"
    timeout: 15000

- takeScreenshot: logged-out
