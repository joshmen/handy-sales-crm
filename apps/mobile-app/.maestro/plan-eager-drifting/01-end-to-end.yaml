appId: host.exp.exponent
name: "Plan eager-drifting-journal — E2E (B.1+B.3+C.2)"
---

# ═══════════════════════════════════════════
# PASO 0: Login vendedor1@jeyma.com
# (Asume pantalla de Login al inicio)
# ═══════════════════════════════════════════
- extendedWaitUntil:
    visible:
      id: "login-button"
    timeout: 30000

- tapOn:
    id: "email-input"
- eraseText: 50
- inputText: "vendedor1@jeyma.com"
- hideKeyboard

- tapOn:
    id: "password-input"
    retryTapIfNoChange: true
- eraseText: 50
- inputText: "test123"
- hideKeyboard

- tapOn:
    id: "login-button"

# Si aparece picker SESSION_LIMIT (Part A Netflix), desconectar otra sesión
- tapOn:
    text: "Dispositivo desconocido"
    optional: true
- tapOn:
    text: "Desconectar y continuar"
    optional: true

# Esperar dashboard
- extendedWaitUntil:
    visible: "Hoy"
    timeout: 45000

- takeScreenshot: "01-dashboard-loaded"

# ═══════════════════════════════════════════
# PASO 1: B.1 — crear pedido (dispara eager-save)
# ═══════════════════════════════════════════
- tapOn: "Vender"
- tapOn: "Vender"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Pedidos"
    timeout: 10000

- tapOn:
    id: "fab-nuevo-pedido"
- waitForAnimationToEnd
- assertVisible: "Tipo de Venta"

- tapOn: "Preventa"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Cliente"
    timeout: 10000

- tapOn: "Abarrotes Don Pancho"
- waitForAnimationToEnd

- tapOn: "Continuar"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Productos"
    timeout: 10000

- tapOn: "Agregar"
- waitForAnimationToEnd

- tapOn: "Revisar pedido"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Subtotal"
    timeout: 10000

- takeScreenshot: "02-revisar-pedido"

- tapOn: "Levantar Pedido"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "ENVIAR"
    timeout: 5000

- tapOn: "ENVIAR"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Pedido Levantado"
    timeout: 15000

- takeScreenshot: "03-pedido-exito"

- tapOn:
    text: "Cerrar"
    optional: true
- back
- waitForAnimationToEnd

# ═══════════════════════════════════════════
# PASO 2: B.3 — intentar logout con pendings
# (esperando que el sync push no termine instant)
# ═══════════════════════════════════════════
- tapOn:
    id: "tab-mas"
    optional: true
- tapOn:
    text: "Mas"
    optional: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Cerrar Sesión"
    timeout: 10000

- tapOn: "Cerrar Sesión"
- waitForAnimationToEnd

# B.3: debe aparecer el modal "Datos sin sincronizar"
# (puede no aparecer si el sync push terminó antes de tocar Cerrar Sesión —
# OK también; el test sigue siendo válido para la rama "sí hay pendings")
- assertVisible:
    text: "Datos sin sincronizar"
    optional: true

- takeScreenshot: "04-logout-attempt"

# Tap fuera o cancelar
- tapOn:
    text: "Cancelar"
    optional: true
- tapOn:
    text: "Cerrar de todos modos"
    optional: true
- back

# ═══════════════════════════════════════════
# PASO 3: C.2 — verificar Restaurar desde servidor visible
# ═══════════════════════════════════════════
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Mas"
    timeout: 10000

- tapOn: "Sincronizaci"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Sincronizar Ahora"
    timeout: 10000

- takeScreenshot: "05-sync-screen"

# Scroll para encontrar Restaurar (al final)
- scroll
- scroll
- takeScreenshot: "06-sync-scrolled"

- assertVisible:
    text: "Restaurar desde servidor"
- assertVisible:
    text: "EMERGENCIA"

- takeScreenshot: "07-restore-button-visible"
