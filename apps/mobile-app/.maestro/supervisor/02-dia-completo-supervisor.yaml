appId: com.handysuites.app
name: "Supervisor: día completo — dashboard, equipo, mapa, perfil"
---

# ═══════════════════════════════════════════
# LOGIN COMO SUPERVISOR (helper robusto: onboarding/consent/logout)
# Tests 03, 04, 05 cubren vender/cobrar completos.
# Este test verifica navegación integral del supervisor.
# ═══════════════════════════════════════════
- runFlow:
    file: ../_helpers/login-as.yaml
    env:
      EMAIL: "supervisor@jeyma.com"
      PASSWORD: "test123"

# ═══════════════════════════════════════════
# FASE 1: DASHBOARD — verificar KPIs de equipo
# ═══════════════════════════════════════════
- tapOn: "Hoy"
- tapOn: "Hoy"
- waitForAnimationToEnd

# Dashboard supervisor real (SupervisorDashboard): KPI "Vendedores activos",
# seccion EQUIPO y ACCIONES RAPIDAS. ("Mi Equipo" es el titulo del TAB Equipo.)
- extendedWaitUntil:
    visible: "Vendedores activos"
    timeout: 15000

- assertVisible: "Pedidos hoy"
- assertVisible: "Ventas mes"
- assertVisible: "ACCIONES RÁPIDAS"

- takeScreenshot: "dia-01-dashboard"

# ═══════════════════════════════════════════
# FASE 2: EQUIPO — KPIs + lista vendedores
# ═══════════════════════════════════════════
- tapOn:
    id: "tab-equipo"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Vendedores"
    timeout: 10000
- assertVisible: "Pedidos hoy"
- assertVisible: "Ventas mes"
- assertVisible: "Visitas hoy"

# Verificar lista de vendedores
- assertVisible: "Vendedor 1 Jeyma"

- takeScreenshot: "dia-02-equipo-kpis"

# ═══════════════════════════════════════════
# FASE 3: DETALLE VENDEDOR
# ═══════════════════════════════════════════
- tapOn: "Vendedor 1 Jeyma"
- waitForAnimationToEnd

- takeScreenshot: "dia-03-vendedor-detalle"

# Volver al equipo
- pressKey: "back"
- waitForAnimationToEnd

# ═══════════════════════════════════════════
# FASE 4: MAPA DEL EQUIPO
# ═══════════════════════════════════════════
- tapOn: "Ver mapa"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Mapa del Equipo"
    timeout: 10000

- takeScreenshot: "dia-04-mapa-equipo"

# Volver al equipo
- pressKey: "back"
- waitForAnimationToEnd

# ═══════════════════════════════════════════
# FASE 5: COBRAR — vista AGREGADA del equipo (CobrarAdminContent para supervisor;
# "Facturado"/"Cobrado"/"Registrar Cobro" son de la vista VENDEDOR, no aplican).
# ═══════════════════════════════════════════
- tapOn: "Cobrar"
- tapOn: "Cobrar"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: ".*Cobros.*"
    timeout: 10000

- takeScreenshot: "dia-05-cobranza-dashboard"

# ═══════════════════════════════════════════
# FASE 6: VENDER — verificar lista de pedidos
# ═══════════════════════════════════════════
- tapOn: "Vender"
- tapOn: "Vender"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Pedidos"
    timeout: 10000

# Vista agregada del equipo (AdminTenantPedidosList): el chip de rango "Hoy"
# (testID filtro-rango-hoy) confirma que cargó. No existe filtro "Todos".
- assertVisible:
    id: "filtro-rango-hoy"

- takeScreenshot: "dia-06-pedidos-lista"

# ═══════════════════════════════════════════
# FASE 7: MÁS — verificar badge Supervisor
# ═══════════════════════════════════════════
- tapOn: "Más"
- waitForAnimationToEnd

- assertVisible: "Supervisor"

- takeScreenshot: "dia-07-mas-supervisor"

# ═══════════════════════════════════════════
# FASE 8: VOLVER AL DASHBOARD — verificar integridad
# ═══════════════════════════════════════════
- tapOn: "Hoy"
- tapOn: "Hoy"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Vendedores activos"
    timeout: 15000

- takeScreenshot: "dia-08-dashboard-final"
