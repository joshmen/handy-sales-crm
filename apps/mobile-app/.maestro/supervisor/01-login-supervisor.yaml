appId: com.handysuites.app
name: "Supervisor: flujo integral — login, equipo, KPIs, mapa, vendedor, dashboard"
---

# ═══════════════════════════════════════════
# FASE 1: LOGIN COMO SUPERVISOR (helper robusto: onboarding/consent/logout)
# ═══════════════════════════════════════════
- runFlow:
    file: ../_helpers/login-as.yaml
    env:
      EMAIL: "supervisor@jeyma.com"
      PASSWORD: "test123"

- takeScreenshot: "01-dashboard-supervisor"

# ═══════════════════════════════════════════
# FASE 2: VERIFICAR DASHBOARD CON BANNER EQUIPO
# ═══════════════════════════════════════════

# Verify the supervisor dashboard KPI is visible on Hoy dashboard
# (SupervisorDashboard.tsx renders KPI "Vendedores activos"; "Mi Equipo" is the
#  Equipo TAB title, not the dashboard.)
- assertVisible:
    text: "Vendedores activos"

# Verify Equipo tab is in the tab bar
- assertVisible:
    text: "Equipo"

- takeScreenshot: "02-dashboard-team-banner"

# ═══════════════════════════════════════════
# FASE 3: NAVEGAR A EQUIPO — VER KPIs + VENDEDORES
# ═══════════════════════════════════════════

# Maestro hace match case-INSENSITIVE: tapOn text "Equipo" matchea el header de
# seccion "EQUIPO" del dashboard (arriba, no interactivo) antes que el tab. El tab
# Equipo no tiene testID; lo tapeamos por posicion (2do de 5 tabs, barra inferior).
- tapOn:
    point: "30%,95%"
- waitForAnimationToEnd

# El tab Equipo renderiza el titulo "Mi Equipo" de inmediato; las KPIs
# ("Vendedores", etc.) llegan del backend con latencia. Anclamos al titulo.
- extendedWaitUntil:
    visible: "Mi Equipo"
    timeout: 15000

# Verify KPI section loaded
- assertVisible:
    id: "supervisor-kpis"

# Verify "Ver mapa" button exists
- assertVisible:
    id: "ver-mapa"

- takeScreenshot: "03-equipo-kpis-vendedores"

# ═══════════════════════════════════════════
# FASE 4: NAVEGAR AL MAPA DEL EQUIPO
# ═══════════════════════════════════════════

- tapOn:
    id: "ver-mapa"
- waitForAnimationToEnd

# Map should load — wait for header
- extendedWaitUntil:
    visible: "Mapa del Equipo"
    timeout: 15000

- takeScreenshot: "04-mapa-equipo"

# Go back to equipo list
- back

# ═══════════════════════════════════════════
# FASE 5: VER DETALLE DE UN VENDEDOR
# ═══════════════════════════════════════════

# Wait for the Equipo tab to be visible again (title renders immediately)
- extendedWaitUntil:
    visible: "Mi Equipo"
    timeout: 10000

# If there are vendedores, tap the first one
- runFlow:
    when:
      visible:
        id: "vendedor-1"
    commands:
      - tapOn:
          id: "vendedor-1"
      - waitForAnimationToEnd
      - extendedWaitUntil:
          visible:
            id: "vendedor-stats"
          timeout: 10000
      - takeScreenshot: "05-vendedor-detalle"
      - back

# ═══════════════════════════════════════════
# FASE 6: VERIFICAR TAB MÁS CON BADGE SUPERVISOR
# ═══════════════════════════════════════════

- tapOn:
    text: "Más"
- waitForAnimationToEnd

- assertVisible:
    text: "Supervisor"

- takeScreenshot: "06-mas-supervisor-badge"

# ═══════════════════════════════════════════
# FASE 7: VOLVER AL DASHBOARD — VERIFICAR INTEGRIDAD
# ═══════════════════════════════════════════

- tapOn:
    text: "Hoy"
- waitForAnimationToEnd

# Dashboard should still show the supervisor KPI
- assertVisible:
    text: "Vendedores activos"

- takeScreenshot: "07-dashboard-final"
