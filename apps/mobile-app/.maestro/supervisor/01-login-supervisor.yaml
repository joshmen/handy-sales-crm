appId: host.exp.exponent
name: "Login as Supervisor"
---

# Wait for app to fully load
- extendedWaitUntil:
    visible: "Vende en ruta"
    timeout: 60000

# Tap Omitir (top-right corner) — use point since text tap may not register on Pressable
- tapOn:
    point: "90%,5%"
- waitForAnimationToEnd

# If still on onboarding, try text tap
- runFlow:
    when:
      visible: "Siguiente"
    commands:
      - tapOn: "Siguiente"
      - tapOn: "Siguiente"
      - tapOn: "Siguiente"
      - tapOn: "Comenzar"

# Wait for login screen
- extendedWaitUntil:
    visible:
      id: "login-button"
    timeout: 30000

- takeScreenshot: "01-login-screen"

# Fill supervisor credentials
- tapOn:
    id: "email-input"
- eraseText
- inputText: "supervisor@jeyma.com"

- tapOn:
    id: "password-input"
- eraseText
- inputText: "test123"
- hideKeyboard

- takeScreenshot: "02-credentials-filled"

# Login
- tapOn:
    id: "login-button"

# Wait for dashboard
- extendedWaitUntil:
    visible: "Hoy"
    timeout: 45000

- takeScreenshot: "03-dashboard"

# Verify Equipo tab visible
- assertVisible:
    text: "Equipo"

- takeScreenshot: "04-equipo-tab"

# Tap Equipo
- tapOn:
    text: "Equipo"
- waitForAnimationToEnd

- assertVisible:
    text: "Mi Equipo"

- takeScreenshot: "05-equipo-screen"

# Go to Más tab
- tapOn:
    text: "Más"
- waitForAnimationToEnd

- assertVisible:
    text: "Supervisor"

- takeScreenshot: "06-supervisor-badge"
