appId: host.exp.exponent
name: "Supervisor: flujo integral — login, equipo, KPIs, mapa, vendedor, dashboard"
---

# ═══════════════════════════════════════════
# FASE 1: LOGIN COMO SUPERVISOR
# ═══════════════════════════════════════════

# Wait for app to fully load
- extendedWaitUntil:
    visible: "Siguiente"
    timeout: 60000

# Skip onboarding: tap Siguiente 3x then Comenzar
- tapOn: "Siguiente"
- tapOn: "Siguiente"
- tapOn: "Siguiente"
- tapOn: "Comenzar"

# Wait for login screen
- extendedWaitUntil:
    visible:
      id: "login-button"
    timeout: 30000

# Fill supervisor credentials
- tapOn:
    id: "email-input"
- eraseText
- inputText: "supervisor@jeyma.com"

- tapOn:
    id: "password-input"
- eraseText
- inputText: "test123"
- hideKeyboard

- tapOn:
    id: "login-button"

# Wait for dashboard
- extendedWaitUntil:
    visible: "Hoy"
    timeout: 45000

- takeScreenshot: "01-dashboard-supervisor"

# ═══════════════════════════════════════════
# FASE 2: VERIFICAR DASHBOARD CON BANNER EQUIPO
# ═══════════════════════════════════════════

# Verify the supervisor team banner is visible on Hoy dashboard
- assertVisible:
    text: "Mi Equipo"

# Verify Equipo tab is in the tab bar
- assertVisible:
    text: "Equipo"

- takeScreenshot: "02-dashboard-team-banner"

# ═══════════════════════════════════════════
# FASE 3: NAVEGAR A EQUIPO — VER KPIs + VENDEDORES
# ═══════════════════════════════════════════

- tapOn:
    text: "Equipo"
- waitForAnimationToEnd

# Should see "Mi Equipo" title and KPIs
- extendedWaitUntil:
    visible: "Vendedores"
    timeout: 15000

# Verify KPI section loaded
- assertVisible:
    id: "supervisor-kpis"

# Verify "Ver mapa" button exists
- assertVisible:
    id: "ver-mapa"

- takeScreenshot: "03-equipo-kpis-vendedores"

# ═══════════════════════════════════════════
# FASE 4: NAVEGAR AL MAPA DEL EQUIPO
# ═══════════════════════════════════════════

- tapOn:
    id: "ver-mapa"
- waitForAnimationToEnd

# Map should load (wait for map or empty state)
- extendedWaitUntil:
    true:
      or:
        - visible: "Sin ubicaciones"
        - visible: "Mapa del Equipo"
    timeout: 15000

- takeScreenshot: "04-mapa-equipo"

# Go back to equipo list
- back

# ═══════════════════════════════════════════
# FASE 5: VER DETALLE DE UN VENDEDOR
# ═══════════════════════════════════════════

# Wait for vendedores list to be visible again
- extendedWaitUntil:
    visible: "Vendedores"
    timeout: 10000

# If there are vendedores, tap the first one
- runFlow:
    when:
      visible:
        id: "vendedor-1"
    commands:
      - tapOn:
          id: "vendedor-1"
      - waitForAnimationToEnd
      - extendedWaitUntil:
          visible:
            id: "vendedor-stats"
          timeout: 10000
      - takeScreenshot: "05-vendedor-detalle"
      - back

# ═══════════════════════════════════════════
# FASE 6: VERIFICAR TAB MÁS CON BADGE SUPERVISOR
# ═══════════════════════════════════════════

- tapOn:
    text: "Más"
- waitForAnimationToEnd

- assertVisible:
    text: "Supervisor"

- takeScreenshot: "06-mas-supervisor-badge"

# ═══════════════════════════════════════════
# FASE 7: VOLVER AL DASHBOARD — VERIFICAR INTEGRIDAD
# ═══════════════════════════════════════════

- tapOn:
    text: "Hoy"
- waitForAnimationToEnd

# Dashboard should still show team banner
- assertVisible:
    text: "Mi Equipo"

- takeScreenshot: "07-dashboard-final"
