appId: host.exp.exponent
name: "Supervisor: Registrar cobro completo end-to-end"
---

# ═══════════════════════════════════════════
# PREREQ: Ya logueado como supervisor@jeyma.com
# Con pedidos creados previamente (hay saldo pendiente)
# ═══════════════════════════════════════════

# Reset navigation
- tapOn: "Hoy"
- tapOn: "Hoy"
- waitForAnimationToEnd
- tapOn: "Cobrar"
- tapOn: "Cobrar"
- waitForAnimationToEnd

# ═══════════════════════════════════════════
# PASO 1: Dashboard de cobranza
# ═══════════════════════════════════════════
- extendedWaitUntil:
    visible: "Facturado"
    timeout: 10000

- takeScreenshot: "cobro-01-dashboard"

# Verificar elementos del dashboard
- assertVisible: "Cobrado"
- assertVisible: "Registrar Cobro"

# ═══════════════════════════════════════════
# PASO 2: Ir a Registrar Cobro
# ═══════════════════════════════════════════
- tapOn:
    id: "btn-registrar-cobro"
- waitForAnimationToEnd

- takeScreenshot: "cobro-02-formulario"

# ═══════════════════════════════════════════
# PASO 3: Seleccionar Cliente
# ═══════════════════════════════════════════
- tapOn: "Seleccionar cliente"
- waitForAnimationToEnd

- takeScreenshot: "cobro-03-picker-clientes"

- tapOn: "Abarrotes Don Pancho"
- waitForAnimationToEnd

- takeScreenshot: "cobro-04-cliente-seleccionado"

# ═══════════════════════════════════════════
# PASO 4: Ingresar Monto
# ═══════════════════════════════════════════
- tapOn:
    text: "0.00"
- inputText: "100"
# Press enter/done to dismiss numeric keyboard
- pressKey: "Enter"
- waitForAnimationToEnd

- takeScreenshot: "cobro-05-monto"

# ═══════════════════════════════════════════
# PASO 5: Seleccionar Método de Pago
# ═══════════════════════════════════════════
- tapOn: "Efectivo"
- waitForAnimationToEnd

- takeScreenshot: "cobro-06-metodo-pago"

# ═══════════════════════════════════════════
# PASO 6: Confirmar Cobro
# ═══════════════════════════════════════════
# Tap the confirm button (text includes formatted amount)
- tapOn: "Confirmar Cobro.*"
- waitForAnimationToEnd

# Confirmation dialog appears
- extendedWaitUntil:
    visible: "CONFIRMAR"
    timeout: 5000
- takeScreenshot: "cobro-06b-dialogo-confirmacion"
- tapOn: "CONFIRMAR"
- waitForAnimationToEnd

# Esperar recibo
- extendedWaitUntil:
    visible: "Cobro Registrado"
    timeout: 15000

- takeScreenshot: "cobro-07-recibo"

# Verificar recibo
- assertVisible: "Cobro Registrado"
- assertVisible: "Abarrotes Don Pancho"

# ═══════════════════════════════════════════
# PASO 7: Volver al dashboard de cobranza
# ═══════════════════════════════════════════
- tapOn: "Listo"
- waitForAnimationToEnd

- takeScreenshot: "cobro-08-dashboard-actualizado"

# Verificar que volvimos al dashboard
- assertVisible: "Facturado"
