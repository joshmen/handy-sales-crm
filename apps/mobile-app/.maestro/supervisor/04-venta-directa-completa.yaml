appId: com.handysuites.app
name: "Supervisor: Venta Directa completa end-to-end"
---

# ═══════════════════════════════════════════
# LOGIN COMO VENDEDOR (helper robusto: onboarding/consent/logout)
# ═══════════════════════════════════════════
# Para SUPERVISOR el tab Vender renderiza VenderAdminContent
# (AdminTenantPedidosList) — NO existe el FAB "fab-nuevo-pedido" ni el
# flujo de crear pedido (solo en VenderVendedorContent, ver
# app/(tabs)/vender/index.tsx). Este flow de venta directa requiere
# sesion VENDEDOR.
- runFlow:
    file: ../_helpers/login-as.yaml
    env:
      EMAIL: "vendedor1@jeyma.com"
      PASSWORD: "test123"

# Reset navigation: doble-tap fuerza reset al root del tab
- tapOn: "Hoy"
- tapOn: "Hoy"
- waitForAnimationToEnd
- tapOn: "Vender"
- tapOn: "Vender"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Pedidos"
    timeout: 5000

# ═══════════════════════════════════════════
# PASO 1: FAB → Nuevo Pedido
# ═══════════════════════════════════════════
- assertVisible: "Pedidos"
- tapOn:
    id: "fab-nuevo-pedido"
- waitForAnimationToEnd
- assertVisible: "¿Qué tipo de pedido?"

# ═══════════════════════════════════════════
# PASO 2: Seleccionar Venta Directa
# ═══════════════════════════════════════════
- tapOn: "Venta Directa"
- waitForAnimationToEnd

# ═══════════════════════════════════════════
# PASO 3: Seleccionar Cliente (diferente al de preventa)
# ═══════════════════════════════════════════
- extendedWaitUntil:
    visible: "Cliente"
    timeout: 10000

- takeScreenshot: "vd-01-clientes"

- tapOn: "Abarrotes Don Pancho"
- waitForAnimationToEnd
- tapOn: "Continuar"
- waitForAnimationToEnd

# ═══════════════════════════════════════════
# PASO 4: Agregar Productos
# ═══════════════════════════════════════════
- extendedWaitUntil:
    visible: "Productos"
    timeout: 10000

- takeScreenshot: "vd-02-productos"

- tapOn: "Agregar"
- waitForAnimationToEnd

- takeScreenshot: "vd-03-producto-agregado"

# ═══════════════════════════════════════════
# PASO 5: Revisar Pedido — debe mostrar método de pago
# ═══════════════════════════════════════════
- tapOn: "Revisar pedido"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Subtotal"
    timeout: 10000

- takeScreenshot: "vd-04-revision"

# Verificar que aparece selector de método de pago (solo Venta Directa)
- assertVisible: "Efectivo"

# Seleccionar Efectivo como método de pago
- tapOn: "Efectivo"
- waitForAnimationToEnd

- takeScreenshot: "vd-05-metodo-pago-seleccionado"

# ═══════════════════════════════════════════
# PASO 6: Cobrar y Entregar
# ═══════════════════════════════════════════
- tapOn: "Cobrar y Entregar"
- waitForAnimationToEnd

# Diálogo de confirmación — Venta Directa dice "COBRAR"
- extendedWaitUntil:
    visible: "COBRAR"
    timeout: 5000

- takeScreenshot: "vd-06-confirmacion"

- tapOn: "COBRAR"
- waitForAnimationToEnd

# Recibo — Venta Directa ahora navega al recibo con print
- extendedWaitUntil:
    visible: "Venta Completada"
    timeout: 15000

- takeScreenshot: "vd-07-recibo"

# Verificar recibo
- assertVisible: "Venta Completada"
- assertVisible: "Abarrotes Don Pancho"

# Listo — vuelve a Vender
- tapOn: "Listo"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Pedidos"
    timeout: 15000

- takeScreenshot: "vd-08-lista-pedidos"
