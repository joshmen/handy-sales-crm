appId: com.handysuites.app
name: "Day-in-the-life Supervisor — login, equipo, mapa con pins, vendedor detalle, logout"
---

# ════════════════════════════════════════════════════════════
# E2E DAY-IN-THE-LIFE — SUPERVISOR
#
# Perfil:        SUPERVISOR
# Email:         supervisor@jeyma.com
# Password:      test123
#
# Flujo completo del día del supervisor:
#   1. Login supervisor + dismiss modales
#   2. Dashboard "Hoy" con saludo "Supervisor"
#   3. Sección EQUIPO + "25 Vendedores activos"
#   4. Scroll a "ACCIONES RÁPIDAS" y tap "Ver Mapa"
#   5. Permission dialog GPS + render mapa
#   6. Screenshot "supervisor-mapa-con-pins"
#   7. Back al dashboard
#   8. Tab "Equipo" + lista vendedores con avatares
#   9. Detalle del primer vendedor
#  10. Volver a "Hoy"
#  11. Tab "Más" → "Cerrar sesión" → logout exitoso
#
# Referencias de strings:
#   apps/mobile-app/app/(tabs)/index.tsx       (dashboard Hoy)
#   apps/mobile-app/app/(tabs)/equipo/index.tsx (lista equipo + KPIs)
#   apps/mobile-app/app/(tabs)/equipo/mapa.tsx  (Mapa del Equipo)
#   apps/mobile-app/app/(tabs)/mas.tsx          (Cerrar sesión)
# ════════════════════════════════════════════════════════════

# ════════════════════════════════════════════════════════════
# FASE 1+2: LOGIN SUPERVISOR via helper robusto
# ════════════════════════════════════════════════════════════

- runFlow:
    file: ../_helpers/login-as.yaml
    env:
      EMAIL: "supervisor@jeyma.com"
      PASSWORD: "test123"

- takeScreenshot: "supervisor-day-01-dashboard-hoy"

# ════════════════════════════════════════════════════════════
# FASE 3: VALIDAR DASHBOARD "HOY" CON SALUDO SUPERVISOR
# ════════════════════════════════════════════════════════════

# Saludo "Buenos días, Supervisor" es un solo nodo → comodín (match completo).
- assertVisible:
    text: ".*Supervisor.*"

# Sección EQUIPO en el dashboard del supervisor
- assertVisible:
    text: "EQUIPO"

# El conteo y la etiqueta "Vendedores activos" son nodos separados; el conteo
# varía con el seed. Anclar solo a la etiqueta.
- assertVisible:
    text: "Vendedores activos"

- takeScreenshot: "supervisor-day-02-equipo-section"

# ════════════════════════════════════════════════════════════
# FASE 4: SCROLL A "ACCIONES RÁPIDAS" + VER MAPA
# ════════════════════════════════════════════════════════════

- scrollUntilVisible:
    element:
      text: "ACCIONES RÁPIDAS"
    direction: DOWN
    timeout: 10000

- assertVisible:
    text: "ACCIONES RÁPIDAS"

- tapOn: "Ver Mapa"
- waitForAnimationToEnd

# Permission dialog GPS (si aparece)
- runFlow:
    when:
      visible: "Permitir"
    commands:
      - tapOn: "Permitir"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "While using the app"
    commands:
      - tapOn:
          text: "While using the app"
          optional: true
      - waitForAnimationToEnd

# ════════════════════════════════════════════════════════════
# FASE 5: VALIDAR HEADER "MAPA DEL EQUIPO" + RENDER
# ════════════════════════════════════════════════════════════

- extendedWaitUntil:
    visible: "Mapa del Equipo"
    timeout: 20000

- assertVisible: "Mapa del Equipo"

# Esperar render del mapa (~5s)
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: "supervisor-mapa-con-pins"

# Verificar que no crashea (ErrorBoundary fallback)
- assertNotVisible:
    text: "Algo salió mal"

# ════════════════════════════════════════════════════════════
# FASE 6: BACK AL DASHBOARD
# ════════════════════════════════════════════════════════════

# Back via ChevronLeft (accessibilityLabel="Volver") o native back
- tapOn:
    text: "Volver"
    optional: true
- waitForAnimationToEnd

- runFlow:
    when:
      visible: "Mapa del Equipo"
    commands:
      - back
      - waitForAnimationToEnd

# ════════════════════════════════════════════════════════════
# FASE 7: TAB "EQUIPO" — LISTA DE VENDEDORES CON AVATARES
# ════════════════════════════════════════════════════════════

- tapOn:
    id: "tab-equipo"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "VENDEDORES"
    timeout: 30000

- assertVisible:
    id: "supervisor-kpis"

- assertVisible:
    text: "VENDEDORES"

- takeScreenshot: "supervisor-day-03-lista-vendedores"

# ════════════════════════════════════════════════════════════
# FASE 8: DETALLE DEL PRIMER VENDEDOR
# ════════════════════════════════════════════════════════════

- runFlow:
    when:
      visible:
        id: "vendedor-1"
    commands:
      - tapOn:
          id: "vendedor-1"
      - waitForAnimationToEnd
      - extendedWaitUntil:
          visible:
            id: "vendedor-stats"
          timeout: 15000
      - takeScreenshot: "supervisor-day-04-vendedor-detalle"
      - back
      - waitForAnimationToEnd

# ════════════════════════════════════════════════════════════
# FASE 9: VOLVER A "HOY"
# ════════════════════════════════════════════════════════════

- tapOn: "Hoy"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "EQUIPO"
    timeout: 15000

# ════════════════════════════════════════════════════════════
# FASE 10: TAB "MÁS" — chip "Supervisor"
# ════════════════════════════════════════════════════════════

- tapOn: "Más"
- waitForAnimationToEnd

- assertVisible:
    text: "Supervisor"

- takeScreenshot: "supervisor-day-05-tab-mas-chip"
