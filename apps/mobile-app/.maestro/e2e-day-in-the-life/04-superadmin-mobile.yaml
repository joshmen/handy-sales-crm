appId: host.exp.exponent
name: "Day in the life — SUPER_ADMIN mobile (xjoshmenx)"
---

# ════════════════════════════════════════════════════════════
# E2E DAY-IN-THE-LIFE — SUPER_ADMIN MOBILE
#
# Perfil:  SUPER_ADMIN (xjoshmenx@gmail.com)
# Sprint:  e2e-day-in-the-life cross-role (06-07)
#
# Contexto:
#   El SUPER_ADMIN usa la web como primary surface, pero también
#   debe poder abrir la app móvil del tenant default (sin impersonar)
#   y validar el AdminDashboard. Este flow es el complemento mobile
#   del spec Playwright apps/web/e2e/e2e-day-superadmin.spec.ts.
#
# Endpoint backend: POST /api/auth/login (200 OK + JWT con rol=SUPER_ADMIN).
# Screen entry:     LoginScreen (apps/mobile-app/app/login.tsx).
# Dashboard target: AdminDashboard (app/(tabs)/index.tsx — branch SUPER_ADMIN).
# ════════════════════════════════════════════════════════════

# ---- FASE 0: Lanzar la app y limpiar consentimientos previos ----

- launchApp:
    clearState: false

# Skip onboarding por testID (primer arranque)
- runFlow:
    when:
      visible:
        id: "skip-onboarding"
    commands:
      - tapOn:
          id: "skip-onboarding"
          optional: true
      - waitForAnimationToEnd:
          timeout: 3000

- runFlow:
    when:
      visible:
        text: "Aviso de Privacidad"
    commands:
      - tapOn:
          text: "Aceptar"
          optional: true
      - waitForAnimationToEnd:
          timeout: 3000

# ---- FASE 1: Pantalla de login visible ----

- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 30000

- takeScreenshot: sa-day-01-login-screen

# ---- FASE 2: Credenciales SUPER_ADMIN ----

- tapOn:
    id: "email-input"
- eraseText: 50
- inputText: "xjoshmenx@gmail.com"

- hideKeyboard

- tapOn:
    id: "password-input"
    retryTapIfNoChange: true
- eraseText: 50
- inputText: "test123"

- hideKeyboard
- takeScreenshot: sa-day-02-credenciales-listas

# ---- FASE 3: Submit ----

- tapOn:
    id: "login-button"

# ---- FASE 4: Dismiss modales/permisos opcionales post-login ----

# Single-session strict: kick previous session
- runFlow:
    when:
      visible: "Límite de sesiones"
    commands:
      - tapOn:
          text: "Chrome en Windows"
          optional: true
      - tapOn:
          text: "Desconectar y continuar aquí"
      - waitForAnimationToEnd:
          timeout: 5000

# GPS consent modal post-login
- runFlow:
    when:
      visible: "Sobre tu ubicación"
    commands:
      - tapOn:
          text: "Entendido"
      - waitForAnimationToEnd:
          timeout: 5000

- runFlow:
    when:
      visible: "Entendido"
    commands:
      - tapOn: "Entendido"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "Acepto"
    commands:
      - tapOn: "Acepto"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "While using the app"
    commands:
      - tapOn:
          text: "While using the app"
          optional: true
      - waitForAnimationToEnd

# Permiso de ubicación (Android system dialog)
- runFlow:
    when:
      visible: "Permitir"
    commands:
      - tapOn:
          text: "Permitir"
          optional: true
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "AHORA NO"
    commands:
      - tapOn: "AHORA NO"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "Más tarde"
    commands:
      - tapOn: "Más tarde"
      - waitForAnimationToEnd

# ---- FASE 5: AdminDashboard renderizado (tenant default del SA) ----
# AdminDashboard expone KPIs propias: "Vendedores", "Pedidos hoy",
# "Ventas del día". VendedorDashboard NO las tiene.

- extendedWaitUntil:
    visible: "Hoy"
    timeout: 45000

- takeScreenshot: sa-day-03-dashboard

- assertVisible:
    text: "Vendedores"

- assertVisible:
    text: "Pedidos hoy"

- assertVisible:
    text: "Ventas del día"

# ---- FASE 6: Quick action "Reportes" — exclusiva del rol admin/SA ----
# Es la prueba positiva del flow Day-in-the-Life: confirmamos que el
# SA tiene acceso al atajo de Reportes desde el tablero móvil.

- assertVisible:
    text: "Reportes"

- takeScreenshot: sa-day-04-quick-actions-reportes

# ---- FASE 7: Tab "Más" — chip "Super Admin" debe estar presente ----
# ROLE_LABELS['SUPER_ADMIN'] = 'Super Admin' (mas.tsx).

- tapOn: "Más"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Super Admin"
    timeout: 20000

- takeScreenshot: sa-day-05-tab-mas-chip

- assertVisible: "Super Admin"

# ---- FASE 8: Logout limpio ----
# Botón "Cerrar sesión" vive al final del scroll en tab "Más".

- scrollUntilVisible:
    element:
      text: "Cerrar sesión"
    direction: DOWN
    timeout: 15000
    speed: 40

- tapOn:
    text: "Cerrar sesión"
    optional: true
- waitForAnimationToEnd

- runFlow:
    when:
      visible: "Sí, cerrar sesión"
    commands:
      - tapOn:
          text: "Sí, cerrar sesión"
      - waitForAnimationToEnd:
          timeout: 5000

- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 30000

- takeScreenshot: sa-day-06-logout-success
