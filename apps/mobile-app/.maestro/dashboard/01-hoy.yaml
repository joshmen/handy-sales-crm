appId: com.handysuites.app
name: "Dashboard - Tab Hoy"
---

# Login VENDEDOR via helper (la sesion NO persiste en cold-start: el runner
# relanza a la pantalla de login). Deja el dashboard "Hoy" cargado.
- runFlow:
    file: ../_helpers/login-as.yaml
    env:
      EMAIL: "vendedor1@jeyma.com"
      PASSWORD: "test123"

# Ir al tab Hoy (bottom tab)
- tapOn: "Hoy"

# Header del dashboard (mayúsculas/acento como renderea la app actual)
- extendedWaitUntil:
    visible: "RESUMEN DEL DÍA"
    timeout: 15000

- takeScreenshot: hoy-dashboard

# KPIs del día
- assertVisible: "Ventas hoy"
- assertVisible: "Completadas"
- assertVisible: "Pendiente"

# Sección Ruta del día
- assertVisible: "RUTA DEL DÍA"

# Scroll para ver acciones rápidas
- scroll

- assertVisible: "ACCIONES RÁPIDAS"
- assertVisible: "Nuevo Pedido"
- assertVisible: "Registrar Cobro"
- assertVisible: "Cerrar jornada"

- takeScreenshot: hoy-scrolled
