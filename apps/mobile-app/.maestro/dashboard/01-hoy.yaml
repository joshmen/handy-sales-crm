appId: host.exp.exponent
name: "Dashboard - Tab Hoy"
---

# Ya estamos en Hoy despues del login
- tapOn: "Hoy"

- extendedWaitUntil:
    visible: "Resumen del D"
    timeout: 15000

- takeScreenshot: hoy-dashboard

# Verificar KPIs
- assertVisible: "Ventas"
- assertVisible: "Completadas"
- assertVisible: "Pendiente"

# Verificar seccion Ruta
- assertVisible: "Ruta del D"

# Scroll para ver acciones rapidas
- scroll

- assertVisible: "Acciones R"
- assertVisible: "Nuevo Pedido"
- assertVisible: "Registrar Cobro"
- assertVisible: "Ver Mapa"

- takeScreenshot: hoy-scrolled
