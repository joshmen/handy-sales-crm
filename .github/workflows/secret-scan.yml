name: Secret Scan

# Audit code-quality 2026-06-06 (sprint pre-prod #5): bloquea PRs/pushes con
# secretos hardcoded. Complementa el pre-commit hook local (.gitleaks.toml).
#
# Cubre dos vectores:
#  1. Push directo a main/staging — escaneo full history del push.
#  2. PR — escaneo del diff vs base (rapido) + verify config valida.

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for push, shallow for PR)
        uses: actions/checkout@v4
        with:
          # PR: depth 1 (gitleaks usa base..head). Push a branch protegida: full history.
          fetch-depth: ${{ github.event_name == 'pull_request' && 1 || 0 }}

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # GITLEAKS_LICENSE solo se necesita para orgs (no para repos personales).
          # Si el repo es de org, agregar secret GITLEAKS_LICENSE en Settings.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml
