name: Secret Scan

# Audit code-quality 2026-06-06 (sprint pre-prod #5): bloquea PRs/pushes con
# secretos hardcoded. Complementa el pre-commit hook local (.gitleaks.toml).
#
# Cubre dos vectores:
#  1. Push directo a main/staging — escaneo full history del push.
#  2. PR — escaneo del diff vs base (rapido) + verify config valida.

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history needed)
        uses: actions/checkout@v4
        with:
          # gitleaks-action v2 hace `git log base_sha^..head_sha` para PRs,
          # asi que necesita el commit PADRE de base accesible. Con
          # fetch-depth: 1 falla con "ambiguous argument base^..head"
          # (audit 2026-06-09). Usar full history en ambos eventos —
          # el costo extra es minimo para este repo.
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # GITLEAKS_LICENSE solo se necesita para orgs (no para repos personales).
          # Si el repo es de org, agregar secret GITLEAKS_LICENSE en Settings.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # gitleaks-action v2 NO acepta `config-path` como input; auto-detecta
        # .gitleaks.toml del root del repo. El warning "Unexpected input(s)
        # 'config-path'" del run anterior confirma esto.
