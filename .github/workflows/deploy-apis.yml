name: Deploy APIs to Railway

on:
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'apps/billing/**'
      - 'apps/mobile/**'
      - 'libs/**'
      - 'infra/docker/Dockerfile.*.Prod'
  workflow_dispatch:
    inputs:
      deploy_all:
        description: 'Deploy all services'
        required: false
        default: 'true'

# Required secrets (configure in GitHub repo settings):
# - PRODUCTION_DB_CONNECTION_STRING: PostgreSQL connection string for EF Core migrations
#
# Railway auto-deploys from main branch (configured in Railway dashboard).
# This workflow only runs EF Core migrations BEFORE Railway deploys.
# Enable "Wait for CI" in Railway service settings so it waits for migrations.

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      main-api: ${{ steps.filter.outputs.main-api }}
      billing-api: ${{ steps.filter.outputs.billing-api }}
      mobile-api: ${{ steps.filter.outputs.mobile-api }}
      deploy-all: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            main-api:
              - 'apps/api/**'
              - 'libs/**'
              - 'infra/docker/Dockerfile.Main.Prod'
            billing-api:
              - 'apps/billing/**'
              - 'infra/docker/Dockerfile.Billing.Prod'
            mobile-api:
              - 'apps/mobile/**'
              - 'libs/**'
              - 'infra/docker/Dockerfile.Mobile.Prod'

  run-tests:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.main-api == 'true' ||
      needs.detect-changes.outputs.billing-api == 'true' ||
      needs.detect-changes.outputs.mobile-api == 'true' ||
      needs.detect-changes.outputs.deploy-all == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Run Main API Tests
        if: |
          needs.detect-changes.outputs.main-api == 'true' ||
          needs.detect-changes.outputs.mobile-api == 'true' ||
          needs.detect-changes.outputs.deploy-all == 'true'
        run: dotnet test apps/api/tests/HandySales.Tests/HandySales.Tests.csproj --configuration Release --logger "trx;LogFileName=main-api-results.trx" --results-directory ./test-results

      - name: Run Billing API Tests
        if: |
          needs.detect-changes.outputs.billing-api == 'true' ||
          needs.detect-changes.outputs.deploy-all == 'true'
        run: dotnet test apps/billing/HandySales.Billing.Tests/HandySales.Billing.Tests.csproj --configuration Release --logger "trx;LogFileName=billing-results.trx" --results-directory ./test-results

      - name: Run Mobile API Tests
        if: |
          needs.detect-changes.outputs.mobile-api == 'true' ||
          needs.detect-changes.outputs.deploy-all == 'true'
        run: dotnet test apps/mobile/HandySales.Mobile.Tests/HandySales.Mobile.Tests.csproj --configuration Release --logger "trx;LogFileName=mobile-results.trx" --results-directory ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results/
          retention-days: 7

  migrate-database:
    name: Apply Database Migrations
    runs-on: ubuntu-latest
    needs: [detect-changes, run-tests]
    if: |
      needs.detect-changes.outputs.main-api == 'true' ||
      needs.detect-changes.outputs.mobile-api == 'true' ||
      needs.detect-changes.outputs.deploy-all == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef --version 8.0.11

      - name: Build efbundle
        run: |
          dotnet ef migrations bundle \
            --project libs/HandySales.Infrastructure \
            --startup-project apps/api/src/HandySales.Api \
            --output ./efbundle \
            --force

      - name: Apply migrations to production
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.PRODUCTION_DB_CONNECTION_STRING }}
        run: |
          chmod +x ./efbundle
          ./efbundle --connection "$ConnectionStrings__DefaultConnection" --verbose

  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, run-tests, migrate-database]
    if: always()
    steps:
      - name: Print deployment results
        run: |
          echo "# Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Tests | ${{ needs.run-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Database Migrations | ${{ needs.migrate-database.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Railway auto-deploys from main branch after CI passes." >> $GITHUB_STEP_SUMMARY
