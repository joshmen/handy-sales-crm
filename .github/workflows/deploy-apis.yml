name: Deploy APIs to Railway

# Sprint pre-prod #95 audit 2026-06-06: concurrency group para evitar
# que dos pushes consecutivos a main/staging hagan deploys paralelos
# (race en migrations + posible inconsistencia entre los 3 APIs).
# cancel-in-progress: false → preserva el deploy anterior; nuevo deploy
# espera. Cambiar a true si queremos cancelar y solo correr el ultimo.
concurrency:
  group: deploy-apis-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches:
      - main      # production deploy (requires approval via GitHub Environment)
      - staging   # staging deploy (auto)
    paths:
      - 'apps/api/**'
      - 'apps/billing/**'
      - 'apps/mobile/**'
      - 'libs/**'
      - 'infra/docker/Dockerfile.*.Prod'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        required: true
        default: 'staging'
        options:
          - staging
          - production
      deploy_all:
        description: 'Deploy all services (ignore path filter)'
        type: boolean
        required: false
        default: true

# Branch → environment mapping:
#   push to `staging` → staging env (auto, no approval)
#   push to `main`    → production env (requires approval via GitHub Environment)
#   workflow_dispatch → user-selected environment
#
# Required secrets (configure in GitHub repo settings):
# - STAGING_DB_CONNECTION_STRING:    PostgreSQL connection for staging migrations
# - PRODUCTION_DB_CONNECTION_STRING: PostgreSQL connection for production migrations
#
# Railway environments:
# - staging:    auto-deploys from `staging` branch
# - production: auto-deploys from `main` branch (keep CI/approval gate)
#
# This workflow runs EF Core migrations BEFORE Railway deploys.
# Enable "Wait for CI" in Railway service settings so it waits for migrations.

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      main-api: ${{ steps.filter.outputs.main-api }}
      billing-api: ${{ steps.filter.outputs.billing-api }}
      mobile-api: ${{ steps.filter.outputs.mobile-api }}
      deploy-all: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_all }}
      target-env: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            main-api:
              - 'apps/api/**'
              - 'libs/**'
              - 'infra/docker/Dockerfile.Main.Prod'
            billing-api:
              - 'apps/billing/**'
              - 'infra/docker/Dockerfile.Billing.Prod'
            mobile-api:
              - 'apps/mobile/**'
              - 'libs/**'
              - 'infra/docker/Dockerfile.Mobile.Prod'

  run-tests:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.main-api == 'true' ||
      needs.detect-changes.outputs.billing-api == 'true' ||
      needs.detect-changes.outputs.mobile-api == 'true' ||
      needs.detect-changes.outputs.deploy-all == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # Sprint 5 audit code-quality: cache NuGet packages.
      # Sin cache, cada CI run re-descargaba todos los packages (~3-5 min).
      # Con cache, hit rate >90% en runs consecutivos -> ahorro 3-5 min/run.
      # Key incluye hash de todos los .csproj para invalidar cuando cambien
      # dependencias.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Run Main API Tests
        if: |
          needs.detect-changes.outputs.main-api == 'true' ||
          needs.detect-changes.outputs.mobile-api == 'true' ||
          needs.detect-changes.outputs.deploy-all == 'true'
        run: dotnet test apps/api/tests/HandySuites.Tests/HandySuites.Tests.csproj --configuration Release --logger "trx;LogFileName=main-api-results.trx" --results-directory ./test-results

      - name: Run Billing API Tests
        if: |
          needs.detect-changes.outputs.billing-api == 'true' ||
          needs.detect-changes.outputs.deploy-all == 'true'
        run: dotnet test apps/billing/HandySuites.Billing.Tests/HandySuites.Billing.Tests.csproj --configuration Release --logger "trx;LogFileName=billing-results.trx" --results-directory ./test-results

      - name: Run Mobile API Tests
        if: |
          needs.detect-changes.outputs.mobile-api == 'true' ||
          needs.detect-changes.outputs.deploy-all == 'true'
        run: dotnet test apps/mobile/HandySuites.Mobile.Tests/HandySuites.Mobile.Tests.csproj --configuration Release --logger "trx;LogFileName=mobile-results.trx" --results-directory ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results/
          retention-days: 7

  migrate-database:
    name: Apply Database Migrations (${{ needs.detect-changes.outputs.target-env }})
    runs-on: ubuntu-latest
    needs: [detect-changes, run-tests]
    environment: ${{ needs.detect-changes.outputs.target-env }}
    if: |
      needs.detect-changes.outputs.main-api == 'true' ||
      needs.detect-changes.outputs.mobile-api == 'true' ||
      needs.detect-changes.outputs.deploy-all == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # Sprint 5 audit: cache NuGet + dotnet-ef global tool para acelerar
      # el build del efbundle. ~2 min de ahorro por run de migration.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-migrate-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-migrate-
            ${{ runner.os }}-nuget-

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef --version 9.0.8

      - name: Build efbundle
        run: |
          dotnet ef migrations bundle \
            --project libs/HandySuites.Infrastructure \
            --startup-project apps/api/src/HandySuites.Api \
            --output ./efbundle \
            --force

      - name: Apply migrations to ${{ needs.detect-changes.outputs.target-env }}
        env:
          CONNECTION_STRING: ${{ needs.detect-changes.outputs.target-env == 'production' && secrets.PRODUCTION_DB_CONNECTION_STRING || secrets.STAGING_DB_CONNECTION_STRING }}
        run: |
          if [ -z "$CONNECTION_STRING" ]; then
            echo "::error::Connection string secret for ${{ needs.detect-changes.outputs.target-env }} is not configured"
            exit 1
          fi
          chmod +x ./efbundle
          ./efbundle --connection "$CONNECTION_STRING" --verbose

  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, run-tests, migrate-database]
    if: always()
    steps:
      - name: Print deployment results
        run: |
          echo "# Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target environment:** \`${{ needs.detect-changes.outputs.target-env }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Tests | ${{ needs.run-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Database Migrations | ${{ needs.migrate-database.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.detect-changes.outputs.target-env }}" = "staging" ]; then
            echo "Railway **staging** auto-deploys from \`staging\` branch after CI passes." >> $GITHUB_STEP_SUMMARY
          else
            echo "Railway **production** auto-deploys from \`main\` branch after CI + approval pass." >> $GITHUB_STEP_SUMMARY
          fi
